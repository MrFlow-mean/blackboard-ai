<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>课程详情 - Linguify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
    h1, h2, h3, .display { font-family: 'Outfit', sans-serif; }
  </style>
</head>
<body class="min-h-screen text-slate-800">
  <div class="max-w-6xl mx-auto px-6 py-8 pb-24">
    <header class="flex items-center justify-between mb-8">
      <div>
        <p class="text-sm text-sky-700 font-semibold">课程详情页</p>
        <h1 id="course-title" class="text-3xl font-extrabold display">课程名称</h1>
      </div>
      <div class="flex gap-2 text-sm">
        <a href="course-workshop.html" class="px-4 py-2 rounded-xl bg-white border border-slate-200">返回工坊</a>
        <a href="course-market-cart.html" class="px-4 py-2 rounded-xl bg-slate-900 text-white">加入购物袋</a>
      </div>
    </header>

    <section class="grid lg:grid-cols-[1.2fr,0.8fr] gap-6 mb-6">
      <article class="bg-white border border-slate-100 rounded-3xl p-7 shadow-sm">
        <div class="flex items-center gap-2 mb-4 text-xs">
          <span id="course-tag" class="px-2 py-1 bg-sky-50 text-sky-700 rounded-full font-semibold">分类</span>
          <span id="course-level" class="px-2 py-1 bg-slate-100 text-slate-600 rounded-full font-semibold">L2</span>
          <span id="course-score" class="px-2 py-1 bg-amber-50 text-amber-600 rounded-full font-semibold">4.9</span>
        </div>
        <p id="course-summary" class="text-slate-600 leading-7 mb-6">课程简介</p>
        <h2 class="text-xl font-bold mb-3">课程大纲</h2>
        <ul id="course-outline" class="space-y-2 text-sm text-slate-600 list-disc pl-5"></ul>
      </article>

      <aside class="bg-white border border-slate-100 rounded-3xl p-7 shadow-sm flex flex-col gap-5">
        <div>
          <p class="text-xs text-slate-400 mb-1">讲师</p>
          <p id="course-instructor" class="font-bold">-</p>
        </div>
        <div>
          <p class="text-xs text-slate-400 mb-1">学习收益</p>
          <p id="course-outcome" class="text-sm text-slate-600">-</p>
        </div>
        <div>
          <p class="text-xs text-slate-400 mb-1">适合人群</p>
          <p id="course-audience" class="text-sm text-slate-600">-</p>
        </div>
        <a href="course-market-plus.html" class="w-full text-center py-3 rounded-xl bg-sky-600 text-white font-bold">开通会员免费学更多</a>
      </aside>
    </section>

    <section class="bg-white border border-slate-100 rounded-3xl p-7 shadow-sm">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold">关联推荐</h2>
        <a href="course-market-discover.html" class="text-sky-700 text-sm font-semibold">返回发现页</a>
      </div>
      <div class="grid md:grid-cols-3 gap-4" id="related-list"></div>
    </section>
  </div>

  <script>
    (function () {
      const courses = {
        'french-journey': {
          title: '掌握法式浪漫：零基础入门法语之旅', tag: '语言学习', level: 'L1', score: '4.9',
          summary: '通过 30 天沉浸式场景训练，建立法语词汇、发音和日常对话的完整基础。',
          outline: ['发音系统与基础句型', '生活场景对话训练', '语法骨架与高频表达', '法语文化拓展与实战复盘'],
          instructor: 'Claire Moreau / 法语教学教研组',
          outcome: '可完成日常问路、点餐、购物、基础商务寒暄。',
          audience: '零基础学习者、准备留学或旅游人群',
          related: [
            { name: '商务英语口语进阶', href: 'course-market-course.html?course=business-english' },
            { name: '西班牙语 B1 冲刺', href: 'course-market-course.html?course=spanish-b1' },
            { name: '日语 N2 高频语法', href: 'course-market-course.html?course=japanese-n2' }
          ]
        },
        'calc-zero-to-one': {
          title: '微积分从零到一', tag: '自然科学', level: 'L2', score: '4.9',
          summary: '从极限、导数到积分，系统搭建大学微积分的核心框架。',
          outline: ['极限与连续', '导数应用', '不定积分与定积分', '级数与综合问题'],
          instructor: '王老师 / 数学组',
          outcome: '掌握微积分核心思想，能独立处理常见建模问题。',
          audience: '高校学生、考研考生、理工自学者',
          related: [
            { name: '线性代数实战案例', href: 'course-market-course.html?course=linear-algebra-case' },
            { name: '量子力学导引', href: 'course-market-course.html?course=quantum-intro' },
            { name: '算法面试强化营', href: 'course-market-course.html?course=algo-interview' }
          ]
        },
        'business-english': {
          title: '商务英语口语进阶', tag: '语言学习', level: 'L2', score: '4.8',
          summary: '围绕汇报、面试、会议、邮件沟通构建商务口语能力。',
          outline: ['商务场景表达模板', '会议发言与提案', '谈判表达与跨文化沟通', '面试与简报实战'],
          instructor: 'Emily Chen / 商务英语组',
          outcome: '在真实职场场景中清晰表达观点并完成沟通任务。',
          audience: '职场新人、外企候选人、需要国际协作岗位',
          related: [
            { name: '法语 30 天零基础', href: 'course-market-course.html?course=french-journey' },
            { name: 'UI 设计思维与系统', href: 'course-market-course.html?course=ui-design-system' },
            { name: 'AI 应用开发工作坊', href: 'course-market-course.html?course=ai-workshop' }
          ]
        },
        'quantum-intro': {
          title: '量子力学导引', tag: '自然科学', level: 'L3', score: '5.0',
          summary: '用可视化思路讲清量子态、测量、隧穿和不确定性原理。',
          outline: ['经典物理到量子物理', '波函数与测量', '算符与本征态', '典型实验与应用场景'],
          instructor: '周教授 / 物理组',
          outcome: '建立量子力学基础认知，能阅读入门论文与教材。',
          audience: '理工科学生、科研兴趣学习者',
          related: [
            { name: '微积分从零到一', href: 'course-market-course.html?course=calc-zero-to-one' },
            { name: '线性代数实战案例', href: 'course-market-course.html?course=linear-algebra-case' },
            { name: '生物科学方法论', href: 'course-market-course.html?course=biology-method' }
          ]
        },
        'linear-algebra-case': { title: '线性代数实战案例', tag: '自然科学', level: 'L2', score: '4.9', summary: '矩阵与向量空间在工程中的实际用法。', outline: ['矩阵运算', '特征值与分解', '线代在机器学习中的应用', '案例复盘'], instructor: '数学教研组', outcome: '把线代知识用于建模与算法。', audience: '理工与算法学习者', related: [] },
        'ui-design-system': { title: 'UI 设计思维与系统', tag: '计算机/设计', level: 'L2', score: '4.8', summary: '从视觉层到组件体系，打造可维护设计系统。', outline: ['信息架构', '视觉规范', '组件系统', '交付流程'], instructor: '产品设计组', outcome: '能独立搭建中型产品 UI 规范。', audience: '设计师与前端协作者', related: [] },
        'modern-world-history': { title: '世界现代史专题', tag: '人文社科', level: 'L2', score: '4.8', summary: '通过关键节点重建全球现代史脉络。', outline: ['工业化与民族国家', '战争与秩序', '冷战结构', '全球化浪潮'], instructor: '历史教研组', outcome: '形成结构化历史理解能力。', audience: '历史爱好者与文科学生', related: [] }
      };

      const defaults = {
        title: '精选课程', tag: '综合', level: 'L2', score: '4.8',
        summary: '这是课程市场中的精选内容，已按学习目标与难度完成结构化编排。',
        outline: ['核心概念学习', '案例解析', '实战任务', '复盘测评'],
        instructor: 'Linguify 教研团队',
        outcome: '获得可迁移的学习能力和实战成果。',
        audience: '希望系统学习并快速应用的人群',
        related: [
          { name: '浏览内容分区', href: 'course-market-zone.html?zone=all' },
          { name: '前往发现页', href: 'course-market-discover.html' },
          { name: '查看会员权益', href: 'course-market-plus.html' }
        ]
      };

      const params = new URL(window.location.href).searchParams;
      const courseKey = params.get('course') || 'featured';
      const fromName = params.get('name');
      const data = courses[courseKey] || defaults;
      if (fromName && !courses[courseKey]) data.title = fromName;

      document.title = `${data.title} - Linguify`;
      document.getElementById('course-title').textContent = data.title;
      document.getElementById('course-tag').textContent = data.tag;
      document.getElementById('course-level').textContent = data.level;
      document.getElementById('course-score').textContent = data.score;
      document.getElementById('course-summary').textContent = data.summary;
      document.getElementById('course-instructor').textContent = data.instructor;
      document.getElementById('course-outcome').textContent = data.outcome;
      document.getElementById('course-audience').textContent = data.audience;
      document.getElementById('course-outline').innerHTML = data.outline.map(item => `<li>${item}</li>`).join('');

      const related = data.related.length ? data.related : defaults.related;
      document.getElementById('related-list').innerHTML = related.map(item => `
        <a href="${item.href}" class="block p-4 rounded-2xl border border-slate-100 bg-slate-50 hover:bg-white transition-colors">
          <p class="font-semibold">${item.name}</p>
          <p class="text-xs text-slate-500 mt-1">点击查看详情</p>
        </a>
      `).join('');
    })();
  </script>
</body>
</html>
