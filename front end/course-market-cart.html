<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>购物袋 - Linguify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
    h1, h2, .display { font-family: 'Outfit', sans-serif; }
  </style>
</head>
<body class="min-h-screen text-slate-800">
  <div class="max-w-6xl mx-auto px-6 py-8 pb-24">
    <header class="flex items-center justify-between mb-8">
      <div>
        <p class="text-sm text-sky-700 font-semibold">课程购物袋</p>
        <h1 class="text-3xl font-extrabold display">你的待购课程</h1>
      </div>
      <a href="course-workshop.html" class="px-4 py-2 rounded-xl bg-slate-900 text-white text-sm font-semibold">返回工坊</a>
    </header>

    <section class="grid lg:grid-cols-[1fr,340px] gap-6">
      <div class="space-y-4">
        <article class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
          <div class="flex items-start justify-between gap-4">
            <div>
              <p class="text-xs text-sky-700 font-semibold mb-1">语言学习</p>
              <h2 class="font-bold text-lg">商务英语口语进阶</h2>
              <p class="text-sm text-slate-500 mt-1">50 个职场实战场景 + 导师点评</p>
            </div>
            <p class="font-bold">¥199</p>
          </div>
        </article>

        <article class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
          <div class="flex items-start justify-between gap-4">
            <div>
              <p class="text-xs text-sky-700 font-semibold mb-1">自然科学</p>
              <h2 class="font-bold text-lg">微积分从零到一</h2>
              <p class="text-sm text-slate-500 mt-1">系统掌握微积分核心框架</p>
            </div>
            <p class="font-bold">¥239</p>
          </div>
        </article>

        <article class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
          <div class="flex items-start justify-between gap-4">
            <div>
              <p class="text-xs text-sky-700 font-semibold mb-1">计算机</p>
              <h2 class="font-bold text-lg">Python 数据挖掘</h2>
              <p class="text-sm text-slate-500 mt-1">项目导向，覆盖数据清洗与分析</p>
            </div>
            <p class="font-bold">¥299</p>
          </div>
        </article>
      </div>

      <aside class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm h-fit">
        <h2 class="font-bold mb-4">结算信息</h2>
        <div class="space-y-2 text-sm text-slate-600 mb-5">
          <div class="flex justify-between"><span>课程小计</span><span>¥737</span></div>
          <div class="flex justify-between"><span>活动优惠</span><span>-¥88</span></div>
          <div class="flex justify-between"><span>会员减免</span><span>-¥60</span></div>
        </div>
        <div class="flex justify-between items-center border-t pt-4 mb-5">
          <span class="font-semibold">应付总计</span>
          <span class="text-2xl font-extrabold text-sky-700">¥589</span>
        </div>
        <button class="w-full py-3 rounded-xl bg-slate-900 text-white font-bold mb-2">立即支付</button>
        <a href="course-market-plus.html" class="block w-full text-center py-3 rounded-xl bg-sky-50 text-sky-700 font-bold">开通会员再省更多</a>
      </aside>
    </section>
  </div>
</body>
</html>
