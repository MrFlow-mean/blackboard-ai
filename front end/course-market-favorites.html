<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>收藏夹 - Linguify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
    h1, h2, .display { font-family: 'Outfit', sans-serif; }
  </style>
</head>
<body class="min-h-screen text-slate-800">
  <div class="max-w-6xl mx-auto px-6 py-8 pb-24">
    <header class="flex items-center justify-between mb-8">
      <div>
        <p class="text-sm text-pink-600 font-semibold">Favorite Courses</p>
        <h1 class="text-3xl font-extrabold display">我的收藏课程</h1>
        <p id="focus-course" class="text-sm text-slate-500 mt-1"></p>
      </div>
      <a href="course-workshop.html" class="px-4 py-2 rounded-xl bg-slate-900 text-white text-sm font-semibold">返回工坊</a>
    </header>

    <section class="grid md:grid-cols-3 gap-5">
      <a href="course-market-course.html?course=calc-zero-to-one" class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
        <p class="text-xs text-pink-600 font-bold mb-2">已收藏</p>
        <h2 class="font-bold mb-2">微积分从零到一</h2>
        <p class="text-sm text-slate-500">理科基础强化 · 4.9 分</p>
      </a>
      <a href="course-market-course.html?course=business-english" class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
        <p class="text-xs text-pink-600 font-bold mb-2">已收藏</p>
        <h2 class="font-bold mb-2">商务英语口语进阶</h2>
        <p class="text-sm text-slate-500">语言表达提升 · 4.8 分</p>
      </a>
      <a href="course-market-course.html?course=quantum-intro" class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
        <p class="text-xs text-pink-600 font-bold mb-2">已收藏</p>
        <h2 class="font-bold mb-2">量子力学导引</h2>
        <p class="text-sm text-slate-500">高阶科学兴趣课 · 5.0 分</p>
      </a>
    </section>
  </div>

  <script>
    (function () {
      const courseMap = {
        calc: '你刚刚收藏了：微积分从零到一',
        'business-english': '你刚刚收藏了：商务英语口语进阶',
        quantum: '你刚刚收藏了：量子力学导引'
      };
      const key = new URL(window.location.href).searchParams.get('course');
      const text = key ? (courseMap[key] || '已更新收藏夹内容。') : '你可以在这里统一管理感兴趣课程。';
      document.getElementById('focus-course').textContent = text;
    })();
  </script>
</body>
</html>
