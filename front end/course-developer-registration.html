<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>课程开发者注册 - Linguify</title>
  <!-- EN: zh-CN UI strings on this page have English equivalents in the embedded i18n dictionary (look for the 'en' section). -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .font-display { font-family: 'Outfit', sans-serif; }
    .card { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(226, 232, 240, 0.9); }
  </style>
</head>
<body class="min-h-screen bg-slate-50">
  <header class="bg-white border-b border-slate-200 px-6 py-4">
    <div class="flex items-center gap-4">
      <a href="course-workshop.html" class="inline-flex items-center justify-center h-10 w-10 rounded-full hover:bg-slate-100 transition-colors">
        <iconify-icon icon="lucide:chevron-left" class="text-xl text-slate-700"></iconify-icon>
      </a>
      <div>
        <h1 class="text-xl font-bold text-slate-800 font-display" data-i18n="dev_title">课程开发者注册</h1>
        <p class="text-xs text-slate-400" data-i18n="dev_subtitle">提交资料后将进入审核流程</p>
      </div>
    </div>
  </header>

  <main class="max-w-xl mx-auto px-6 py-8">
    <section class="card rounded-2xl p-6 shadow-sm space-y-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2" data-i18n="label_name">姓名 / 团队名称</label>
        <input type="text" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-sky-200 text-sm" placeholder="输入名称" data-i18n-placeholder="placeholder_name">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2" data-i18n="label_email">联系邮箱</label>
        <input type="email" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-sky-200 text-sm" placeholder="name@example.com" data-i18n-placeholder="placeholder_email">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2" data-i18n="label_domain">擅长领域</label>
        <input type="text" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-sky-200 text-sm" placeholder="语言 / 理科 / 人文 / 编程" data-i18n-placeholder="placeholder_domain">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2" data-i18n="label_intro">课程简介</label>
        <textarea rows="4" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-sky-200 text-sm" placeholder="请简要描述你想创建的课程" data-i18n-placeholder="placeholder_intro"></textarea>
      </div>
      <button class="w-full py-3 rounded-xl bg-sky-500 text-white font-semibold hover:bg-sky-600 transition-colors" data-i18n="submit_btn">
        提交审核
      </button>
    </section>
  </main>

  <script>
    (function () {
      const LANG_STORAGE_KEY = 'ui-language';
      const UI_I18N = {
        'zh-CN': {
          page_title: '课程开发者注册 - Linguify',
          dev_title: '课程开发者注册',
          dev_subtitle: '提交资料后将进入审核流程',
          label_name: '姓名 / 团队名称',
          placeholder_name: '输入名称',
          label_email: '联系邮箱',
          placeholder_email: 'name@example.com',
          label_domain: '擅长领域',
          placeholder_domain: '语言 / 理科 / 人文 / 编程',
          label_intro: '课程简介',
          placeholder_intro: '请简要描述你想创建的课程',
          submit_btn: '提交审核'
        },
        'en': {
          page_title: 'Course Creator Registration - Linguify',
          dev_title: 'Course Creator Registration',
          dev_subtitle: 'Submit your info to start the review process',
          label_name: 'Name / Team',
          placeholder_name: 'Enter name',
          label_email: 'Contact email',
          placeholder_email: 'name@example.com',
          label_domain: 'Expertise',
          placeholder_domain: 'Languages / STEM / Humanities / Programming',
          label_intro: 'Course Summary',
          placeholder_intro: 'Briefly describe the course you want to create',
          submit_btn: 'Submit for Review'
        }
      };

      const lang = localStorage.getItem(LANG_STORAGE_KEY) || 'zh-CN';
      const t = (key) => {
        const dict = UI_I18N[lang] || UI_I18N['zh-CN'];
        return dict[key] || UI_I18N['zh-CN'][key] || '';
      };

      document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        el.textContent = t(key);
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.dataset.i18nPlaceholder;
        el.setAttribute('placeholder', t(key));
      });
      document.title = t('page_title');
    })();
  </script>
</body>
</html>
