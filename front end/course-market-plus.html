<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会员中心 - Linguify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #e0f2fe 0%, #f8fafc 45%); }
    h1, h2, .display { font-family: 'Outfit', sans-serif; }
  </style>
</head>
<body class="min-h-screen text-slate-800">
  <div class="max-w-6xl mx-auto px-6 py-8 pb-24">
    <header class="flex items-center justify-between mb-8">
      <div>
        <p class="text-sm text-sky-700 font-semibold">Linguify Plus</p>
        <h1 class="text-3xl font-extrabold display">会员中心 · 无限课程访问</h1>
      </div>
      <a href="course-workshop.html" class="px-4 py-2 rounded-xl bg-slate-900 text-white text-sm font-semibold">返回工坊</a>
    </header>

    <section class="rounded-3xl bg-gradient-to-r from-sky-700 to-cyan-600 text-white p-8 mb-8 shadow-xl">
      <p class="text-xs uppercase tracking-[0.2em] opacity-80 mb-3">Premium Plan</p>
      <h2 class="text-4xl font-extrabold display mb-3">500+ 课程一次开通</h2>
      <p class="opacity-90 mb-5">覆盖语言、理工、人文、计算机四大分区，支持离线下载、学习路径推荐、导师答疑优先排队。</p>
      <div class="flex flex-wrap gap-3 text-sm">
        <span class="px-3 py-1.5 rounded-full bg-white/20">4K 画质</span>
        <span class="px-3 py-1.5 rounded-full bg-white/20">学习日历</span>
        <span class="px-3 py-1.5 rounded-full bg-white/20">跨设备同步</span>
        <span class="px-3 py-1.5 rounded-full bg-white/20">课程更新自动解锁</span>
      </div>
    </section>

    <section class="grid md:grid-cols-3 gap-5">
      <article class="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm">
        <p class="text-sm text-slate-500 mb-2">月付</p>
        <h3 class="text-3xl font-extrabold mb-2">¥79</h3>
        <p class="text-sm text-slate-500 mb-4">适合短期冲刺</p>
        <button class="w-full py-2.5 rounded-xl bg-slate-900 text-white font-semibold">立即开通</button>
      </article>
      <article class="bg-white border-2 border-sky-500 rounded-2xl p-6 shadow-sm relative">
        <span class="absolute -top-3 right-4 px-3 py-1 rounded-full bg-sky-600 text-white text-xs font-bold">推荐</span>
        <p class="text-sm text-slate-500 mb-2">季付</p>
        <h3 class="text-3xl font-extrabold mb-2">¥199</h3>
        <p class="text-sm text-slate-500 mb-4">平均每月 ¥66</p>
        <button class="w-full py-2.5 rounded-xl bg-sky-600 text-white font-semibold">立即开通</button>
      </article>
      <article class="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm">
        <p class="text-sm text-slate-500 mb-2">年付</p>
        <h3 class="text-3xl font-extrabold mb-2">¥699</h3>
        <p class="text-sm text-slate-500 mb-4">平均每月 ¥58</p>
        <button class="w-full py-2.5 rounded-xl bg-slate-900 text-white font-semibold">立即开通</button>
      </article>
    </section>
  </div>
</body>
</html>
