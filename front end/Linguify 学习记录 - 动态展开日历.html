<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Linguify - 学习记录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <style>
    @import url('https://api.fontshare.com/v2/css?f[]=outfit@400,500,600,700,800&f[]=plus-jakarta-sans@400,500,600,700&display=swap');

    :root {
      --primary: #0ea5e9;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
      -webkit-tap-highlight-color: transparent;
    }

    h1, h2, h3, .font-display {
      font-family: 'Outfit', sans-serif;
    }

    /* Grid Background */
    .bg-grid-pattern {
      background-image: radial-gradient(circle, #0ea5e9 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.05;
    }

    /* Glassmorphism */
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 8px 32px -4px rgba(14, 165, 233, 0.08);
    }

    .glass-header {
      background: rgba(248, 250, 252, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(14, 165, 233, 0.08);
    }

    .glass-footer {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(241, 245, 249, 1);
    }

    .nav-workshop-icon {
      filter: grayscale(1);
      opacity: 0.65;
      mix-blend-mode: multiply;
      transition: filter 0.2s ease, opacity 0.2s ease;
    }
    .group:hover .nav-workshop-icon {
      filter: none;
      opacity: 1;
      mix-blend-mode: normal;
    }

    /* Scrollbar hidden */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Calendar Day States */
    .day-cell { transition: all 0.2s ease; cursor: pointer; }
    .day-cell:hover { transform: scale(1.05); z-index: 10; box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.2); }
    .day-cell:active { transform: scale(0.95); }
    
    .day-light { background-color: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
    .day-medium { background-color: #7dd3fc; color: #0c4a6e; font-weight: 600; }
    .day-heavy { background-color: #0ea5e9; color: white; font-weight: 700; box-shadow: 0 2px 8px rgba(14, 165, 233, 0.4); }
    .day-empty { background-color: white; color: #94a3b8; border: 1px solid #f1f5f9; }

    /* Animation */
    .stagger-in > * {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.4s ease forwards;
    }
    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
  </style>
</head>
<body>
  <div class="w-full h-screen flex flex-col relative overflow-hidden">
    
    <!-- Ambient Background Decorations -->
    <div class="absolute inset-0 bg-grid-pattern pointer-events-none z-0"></div>
    <div class="absolute top-10 right-[-10%] w-64 h-64 bg-sky-200 rounded-full mix-blend-multiply filter blur-[80px] opacity-50 pointer-events-none z-0"></div>
    <div class="absolute bottom-1/4 left-[-15%] w-72 h-72 bg-blue-100 rounded-full mix-blend-multiply filter blur-[80px] opacity-40 pointer-events-none z-0"></div>

    <!-- Header -->
    <header class="shrink-0 pt-14 pb-3 px-5 glass-header relative z-40">
      <div class="flex items-center justify-between mb-2 max-w-2xl mx-auto w-full">
        <a href="index.html" id="btn-back" class="w-10 h-10 rounded-full flex items-center justify-center bg-white shadow-sm text-slate-700 active:scale-95 transition-transform" aria-label="返回首页">
          <iconify-icon icon="lucide:chevron-left" class="text-xl"></iconify-icon>
        </a>
        <h1 class="font-display text-lg font-bold text-slate-800 tracking-wide">学习记录</h1>
        <a href="#" id="btn-filter" class="w-10 h-10 rounded-full flex items-center justify-center bg-sky-50 text-sky-600 active:scale-95 transition-transform">
          <iconify-icon icon="lucide:sliders-horizontal" class="text-lg"></iconify-icon>
        </a>
      </div>
    </header>

    <!-- Main Scrollable Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar pb-[100px] relative z-10">
      <div class="px-5 py-6 flex flex-col gap-6 stagger-in max-w-xl mx-auto w-full">

        <!-- Calendar Section（data-year/data-month 用于按日期查学习记录） -->
        <section id="calendar-section" class="glass-card rounded-[2rem] p-5 delay-1" data-year="" data-month="">
          <!-- Month Selector -->
          <div class="flex items-center justify-between mb-5 px-1">
            <button type="button" id="btn-prev-month" class="p-1.5 text-slate-400 hover:text-sky-500 hover:bg-sky-50 rounded-lg transition-colors">
              <iconify-icon icon="lucide:chevron-left" class="text-xl"></iconify-icon>
            </button>
            <h2 id="calendar-month-label" class="font-display text-lg font-bold text-slate-800 tracking-wide flex items-center gap-2">
              <iconify-icon icon="lucide:calendar-days" class="text-sky-500"></iconify-icon>
              <span id="calendar-month-text">2024年 5月</span>
            </h2>
            <button type="button" id="btn-next-month" class="p-1.5 text-slate-400 hover:text-sky-500 hover:bg-sky-50 rounded-lg transition-colors">
              <iconify-icon icon="lucide:chevron-right" class="text-xl"></iconify-icon>
            </button>
          </div>

          <!-- Calendar Grid -->
          <div class="w-full">
            <!-- Weekdays -->
            <div class="grid grid-cols-7 gap-1 mb-2 text-center">
              <div class="text-[10px] font-bold text-slate-400 uppercase">一</div>
              <div class="text-[10px] font-bold text-slate-400 uppercase">二</div>
              <div class="text-[10px] font-bold text-slate-400 uppercase">三</div>
              <div class="text-[10px] font-bold text-slate-400 uppercase">四</div>
              <div class="text-[10px] font-bold text-slate-400 uppercase">五</div>
              <div class="text-[10px] font-bold text-sky-400 uppercase">六</div>
              <div class="text-[10px] font-bold text-sky-400 uppercase">日</div>
            </div>
            <!-- Days Grid（按当前年月动态生成，星期对齐） -->
            <div id="calendar-days-grid" class="grid grid-cols-7 gap-1.5 sm:gap-2"></div>
          </div>
          <div class="flex justify-end gap-3 mt-5 text-[10px] text-slate-500 font-medium items-center">
            <span class="flex items-center gap-1"><div class="w-2 h-2 rounded-sm bg-sky-100 border border-sky-200"></div> 轻度</span>
            <span class="flex items-center gap-1"><div class="w-2 h-2 rounded-sm bg-sky-300"></div> 中度</span>
            <span class="flex items-center gap-1"><div class="w-2 h-2 rounded-sm bg-sky-500"></div> 深度</span>
          </div>
        </section>

        <!-- Monthly Stats -->
        <section class="grid grid-cols-2 gap-3 delay-2">
          <div class="bg-white/70 backdrop-blur-md rounded-[1.5rem] p-4 border border-slate-100 shadow-sm flex items-center justify-between">
            <div>
              <span class="text-[10px] font-bold text-slate-400 block mb-0.5 uppercase tracking-wider">本月打卡</span>
              <span class="font-display text-xl font-bold text-slate-800">15 <span class="text-[10px] text-slate-400 font-medium">天</span></span>
            </div>
            <div class="w-8 h-8 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center">
              <iconify-icon icon="lucide:calendar-check" class="text-sm"></iconify-icon>
            </div>
          </div>
          <div class="bg-white/70 backdrop-blur-md rounded-[1.5rem] p-4 border border-slate-100 shadow-sm flex items-center justify-between">
            <div>
              <span class="text-[10px] font-bold text-slate-400 block mb-0.5 uppercase tracking-wider">本月时长</span>
              <span class="font-display text-xl font-bold text-slate-800">720 <span class="text-[10px] text-slate-400 font-medium">分</span></span>
            </div>
            <div class="w-8 h-8 rounded-full bg-purple-50 text-purple-500 flex items-center justify-center">
              <iconify-icon icon="lucide:clock" class="text-sm"></iconify-icon>
            </div>
          </div>
        </section>

      </div>
    </main>

    <!-- Fixed Bottom Navigation（与 index 主页一致） -->
    <nav class="fixed bottom-0 left-0 right-0 z-50 px-6 py-3 pb-6 flex items-center justify-around border-t border-slate-100" style="background: rgba(248, 250, 252, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);">
      <a href="index.html" class="flex flex-col items-center gap-1 text-slate-300 hover:text-sky-400 transition-colors">
        <iconify-icon icon="lucide:home" class="text-2xl"></iconify-icon>
        <span class="text-[10px] font-bold">首页</span>
      </a>
      <a href="course-workshop.html" class="flex flex-col items-center gap-1 text-slate-300 hover:text-sky-400 transition-colors group">
        <img src="./assets/icons/nav-workshop.png" class="w-7 h-7 nav-workshop-icon" alt="课程工坊">
        <span class="text-[10px] font-bold">课程工坊</span>
      </a>
      <span class="flex flex-col items-center gap-1 text-sky-600 cursor-default">
        <div class="relative">
          <iconify-icon icon="lucide:book-open-check" class="text-2xl"></iconify-icon>
          <div class="absolute -top-1 -right-1 w-2 h-2 bg-sky-500 rounded-full border-2 border-white"></div>
        </div>
        <span class="text-[10px] font-bold">记录</span>
      </span>
      <a href="my-settings.html" class="flex flex-col items-center gap-1 text-slate-300 hover:text-sky-400 transition-colors">
        <iconify-icon icon="lucide:user" class="text-2xl"></iconify-icon>
        <span class="text-[10px] font-bold">我的</span>
      </a>
    </nav>

    <!-- MODAL OVERLAY & EXPANDING BOX -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/30 backdrop-blur-[4px] z-[60] hidden opacity-0 transition-opacity duration-300 cursor-pointer"></div>

    <div id="day-modal" class="fixed z-[70] overflow-hidden backdrop-blur-xl border border-white/60 shadow-2xl flex flex-col hidden origin-top-left">
      <div id="modal-content" class="flex flex-col h-full w-full opacity-0 relative">
        
        <!-- Modal Header -->
        <div class="flex items-center justify-between p-4 sm:p-5 border-b border-slate-100 shrink-0 bg-white/80">
          <button id="btn-close-modal" class="w-10 h-10 rounded-full flex items-center justify-center bg-slate-100 text-slate-700 hover:bg-slate-200 transition-colors active:scale-95">
            <iconify-icon icon="lucide:arrow-left" class="text-xl"></iconify-icon>
          </button>
          <div class="text-center flex-1">
            <h3 id="modal-date-title" class="font-display text-lg font-bold text-slate-800">5月15日</h3>
            <p class="text-[10px] text-slate-500 font-medium uppercase tracking-widest">学习详情</p>
          </div>
          <button class="w-10 h-10 rounded-full flex items-center justify-center text-sky-600 hover:bg-sky-50 transition-colors active:scale-95">
            <iconify-icon icon="lucide:plus" class="text-xl"></iconify-icon>
          </button>
        </div>
        
        <!-- Modal Body (Scrollable) -->
        <div class="flex-1 overflow-y-auto p-4 sm:p-6 hide-scrollbar bg-slate-50/80">
          
          <!-- Records Container（按日真实数据渲染） -->
          <div id="records-container" class="flex flex-col gap-4 max-w-2xl mx-auto w-full">
            <div id="daily-stats" class="flex gap-4 bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
               <div class="flex-1 text-center">
                 <span class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">当日时长</span>
                 <span id="stat-minutes" class="font-display text-2xl font-bold text-sky-500">0<span class="text-[10px] text-slate-400 font-medium ml-1">分</span></span>
               </div>
               <div class="w-px bg-slate-100"></div>
               <div class="flex-1 text-center">
                 <span class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">完成记录</span>
                 <span id="stat-count" class="font-display text-2xl font-bold text-sky-500">0<span class="text-[10px] text-slate-400 font-medium ml-1">项</span></span>
               </div>
            </div>
            <div id="records-cards" class="flex flex-col gap-3 mt-2"></div>
          </div>

          <!-- Empty State -->
          <div id="empty-state" class="hidden h-full flex flex-col items-center justify-center py-12 opacity-80">
            <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-4">
              <iconify-icon icon="lucide:coffee" class="text-3xl text-slate-400"></iconify-icon>
            </div>
            <p class="text-base font-bold text-slate-600">今天没有学习记录</p>
            <p class="text-xs text-slate-400 mt-1 mb-6">给自己放个假，或者开始新的学习吧</p>
            <button class="px-6 py-2.5 bg-sky-500 text-white text-sm font-bold rounded-full shadow-lg shadow-sky-500/30 hover:bg-sky-600 transition-colors active:scale-95">
              记录学习
            </button>
          </div>
          
        </div>
      </div>
    </div>

  </div>

  <script>
    const SESSION_ARCHIVE_KEY = 'linguify-session-archive';
    let activeCell = null;
    let sessionsByDate = {}; // { 'YYYY-MM-DD': [ session, ... ] }
    let calendarYear = new Date().getFullYear();
    let calendarMonth = new Date().getMonth() + 1;

    function loadSessionArchive() {
      try {
        const raw = localStorage.getItem(SESSION_ARCHIVE_KEY);
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return {};
        return parsed;
      } catch (e) {
        return {};
      }
    }

    function buildSessionsByDate() {
      const archive = loadSessionArchive();
      const byDate = {};
      Object.values(archive).forEach(session => {
        if (!session || typeof session !== 'object') return;
        const started = session.started_at || session.ended_at;
        if (!started) return;
        const d = new Date(started);
        if (Number.isNaN(d.getTime())) return;
        const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        if (!byDate[key]) byDate[key] = [];
        byDate[key].push(session);
      });
      Object.keys(byDate).forEach(k => {
        byDate[k].sort((a, b) => new Date(a.started_at || 0).getTime() - new Date(b.started_at || 0).getTime());
      });
      sessionsByDate = byDate;
    }

    function escapeHtml(s) {
      if (s == null || s === '') return '';
      const t = String(s);
      return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function formatTime(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '';
      return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    function renderDayRecords(year, month, day) {
      const dateKey = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const sessions = sessionsByDate[dateKey] || [];
      const totalMinutes = sessions.reduce((sum, s) => sum + Math.round((s.duration_seconds || 0) / 60), 0);

      document.getElementById('modal-date-title').innerText = `${month}月${day}日`;
      document.getElementById('stat-minutes').innerHTML = totalMinutes + '<span class="text-[10px] text-slate-400 font-medium ml-1">分</span>';
      document.getElementById('stat-count').innerHTML = sessions.length + '<span class="text-[10px] text-slate-400 font-medium ml-1">项</span>';

      const cardsEl = document.getElementById('records-cards');
      cardsEl.innerHTML = '';
      const colorClasses = [
        { bar: 'bg-blue-500', tag: 'bg-blue-50 text-blue-600 border-blue-100', hover: 'group-hover:text-blue-600' },
        { bar: 'bg-purple-500', tag: 'bg-purple-50 text-purple-600 border-purple-100', hover: 'group-hover:text-purple-600' },
        { bar: 'bg-green-500', tag: 'bg-green-50 text-green-600 border-green-100', hover: 'group-hover:text-green-600' },
        { bar: 'bg-amber-500', tag: 'bg-amber-50 text-amber-600 border-amber-100', hover: 'group-hover:text-amber-600' },
        { bar: 'bg-cyan-500', tag: 'bg-cyan-50 text-cyan-600 border-cyan-100', hover: 'group-hover:text-cyan-600' }
      ];
      sessions.forEach((session, i) => {
        const title = session.title || '学习记录';
        const summary = session.summary || '';
        const startTime = formatTime(session.started_at);
        const endTime = formatTime(session.ended_at);
        const duration = Math.round((session.duration_seconds || 0) / 60);
        const timeRange = startTime && endTime ? `${startTime} - ${endTime}` : (startTime || '');
        const c = colorClasses[i % colorClasses.length];
        const card = document.createElement('div');
        card.className = 'bg-white rounded-[1.5rem] overflow-hidden relative group hover:shadow-md transition-all border border-slate-100';
        card.innerHTML = `
          <div class="absolute left-0 top-0 bottom-0 w-1.5 ${c.bar}"></div>
          <div class="p-4 sm:p-5 pl-5 sm:pl-6">
            <div class="flex justify-between items-start mb-3">
              <div class="flex items-center gap-2 sm:gap-3">
                <span class="px-2.5 py-1 ${c.tag} text-[11px] font-bold rounded-lg border tracking-wide">AI 语音</span>
                ${timeRange ? `<span class="text-[11px] font-medium text-slate-400 flex items-center gap-1"><iconify-icon icon="lucide:clock-4"></iconify-icon> ${escapeHtml(timeRange)}</span>` : ''}
              </div>
              <div class="flex items-center gap-1.5 bg-slate-50 px-2 py-1 rounded-lg border border-slate-100">
                <iconify-icon icon="lucide:timer" class="text-[10px] text-slate-400"></iconify-icon>
                <span class="font-display text-sm font-bold text-slate-700">${duration} <span class="text-[10px] font-medium text-slate-400">分钟</span></span>
              </div>
            </div>
            <h4 class="text-[15px] font-bold text-slate-800 mb-1.5 ${c.hover} transition-colors">${escapeHtml(title)}</h4>
            ${summary ? `<p class="text-xs text-slate-500 leading-relaxed">${escapeHtml(summary)}</p>` : ''}
          </div>
        `;
        cardsEl.appendChild(card);
      });
    }

    function openDayDetails(cell, day, year, month) {
      const dateKey = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const sessions = sessionsByDate[dateKey] || [];
      const hasRecords = sessions.length > 0;

      if (document.getElementById('day-modal').style.transition !== 'none' && 
          document.getElementById('day-modal').style.transition !== '') {
          return;
      }

      activeCell = cell;
      const rect = cell.getBoundingClientRect();
      const modal = document.getElementById('day-modal');
      const overlay = document.getElementById('modal-overlay');
      const modalContent = document.getElementById('modal-content');

      renderDayRecords(year, month, day);

      if (hasRecords) {
          document.getElementById('records-container').classList.remove('hidden');
          document.getElementById('empty-state').classList.add('hidden');
      } else {
          document.getElementById('records-container').classList.add('hidden');
          document.getElementById('empty-state').classList.remove('hidden');
      }

      // 1. Prepare initial state matching the exact cell bounds
      const computedStyle = window.getComputedStyle(cell);
      modal.style.transition = 'none';
      modalContent.style.transition = 'none';
      modalContent.style.opacity = '0';
      
      modal.style.backgroundColor = computedStyle.backgroundColor;
      modal.style.top = rect.top + 'px';
      modal.style.left = rect.left + 'px';
      modal.style.width = rect.width + 'px';
      modal.style.height = rect.height + 'px';
      modal.style.borderRadius = computedStyle.borderRadius;
      modal.style.transform = 'none';
      
      modal.classList.remove('hidden');
      overlay.classList.remove('hidden');
      
      // Force browser reflow to apply initial state without animation
      void modal.offsetWidth;
      
      // 2. Calculate target state for expanded modal
      const isMobile = window.innerWidth < 640;
      let targetTop, targetLeft, targetWidth, targetHeight, targetRadius, targetTransform;
      
      if (isMobile) {
        targetTop = '0px';
        targetLeft = '0px';
        targetWidth = '100%';
        targetHeight = '100%';
        targetRadius = '0px';
        targetTransform = 'none';
      } else {
        targetWidth = '600px';
        targetHeight = '80vh';
        targetTop = '50%';
        targetLeft = '50%';
        targetTransform = 'translate(-50%, -50%)';
        targetRadius = '24px';
      }
      
      // 3. Start Animation to target state
      modal.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s ease';
      modal.style.top = targetTop;
      modal.style.left = targetLeft;
      modal.style.width = targetWidth;
      modal.style.height = targetHeight;
      modal.style.transform = targetTransform;
      modal.style.borderRadius = targetRadius;
      modal.style.backgroundColor = 'rgba(255, 255, 255, 0.96)'; // Glassmorphism white
      
      overlay.style.opacity = '1';
      
      // 4. Fade in content after the box has expanded slightly
      setTimeout(() => {
        modalContent.style.transition = 'opacity 0.25s ease';
        modalContent.style.opacity = '1';
      }, 150);
    }

    function closeDayDetails() {
      if (!activeCell) return;
      
      const modal = document.getElementById('day-modal');
      const overlay = document.getElementById('modal-overlay');
      const modalContent = document.getElementById('modal-content');
      
      // Get the current position of the cell we clicked previously
      const rect = activeCell.getBoundingClientRect();
      const computedStyle = window.getComputedStyle(activeCell);
      
      // 1. Fade out content quickly
      modalContent.style.transition = 'opacity 0.15s ease';
      modalContent.style.opacity = '0';
      
      // 2. Animate box back to original cell bounds
      setTimeout(() => {
        modal.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s ease';
        modal.style.top = rect.top + 'px';
        modal.style.left = rect.left + 'px';
        modal.style.width = rect.width + 'px';
        modal.style.height = rect.height + 'px';
        modal.style.transform = 'none';
        modal.style.borderRadius = computedStyle.borderRadius;
        modal.style.backgroundColor = computedStyle.backgroundColor;
        
        overlay.style.opacity = '0';
        
        // 3. Hide completely after animation finishes, and reset inline styles so next open works
        setTimeout(() => {
          modal.classList.add('hidden');
          overlay.classList.add('hidden');
          modal.style.transition = '';
          modalContent.style.transition = '';
          modalContent.style.opacity = '';
          activeCell = null;
        }, 400);
      }, 50);
    }

    function syncCalendarLabel() {
      const section = document.getElementById('calendar-section');
      const textEl = document.getElementById('calendar-month-text');
      if (section) {
        section.dataset.year = String(calendarYear);
        section.dataset.month = String(calendarMonth);
      }
      if (textEl) textEl.innerText = `${calendarYear}年 ${calendarMonth}月`;
    }

    // 周一为第一列，与表头 一 二 三 四 五 六 日 对齐
    function getFirstDayOffset(year, month) {
      const d = new Date(year, month - 1, 1);
      const jsDay = d.getDay();
      return (jsDay + 6) % 7;
    }

    function getDaysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function getRecordLevelForDate(dateKey) {
      const list = sessionsByDate[dateKey];
      if (!list || list.length === 0) return 'empty';
      const totalMin = list.reduce((s, x) => s + Math.round((x.duration_seconds || 0) / 60), 0);
      if (totalMin >= 60) return 'heavy';
      if (totalMin >= 20) return 'medium';
      return 'light';
    }

    function renderCalendarGrid() {
      const grid = document.getElementById('calendar-days-grid');
      if (!grid) return;
      const firstOffset = getFirstDayOffset(calendarYear, calendarMonth);
      const daysInMonth = getDaysInMonth(calendarYear, calendarMonth);
      const today = new Date();
      const isCurrentMonth = today.getFullYear() === calendarYear && today.getMonth() + 1 === calendarMonth;
      const todayDate = today.getDate();

      grid.innerHTML = '';
      for (let i = 0; i < firstOffset; i++) {
        const empty = document.createElement('div');
        empty.className = 'aspect-square';
        grid.appendChild(empty);
      }
      for (let day = 1; day <= daysInMonth; day++) {
        const dateKey = `${calendarYear}-${String(calendarMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const level = getRecordLevelForDate(dateKey);
        const isToday = isCurrentMonth && day === todayDate;
        const cell = document.createElement('div');
        cell.className = 'day-cell aspect-square rounded-[12px] flex flex-col items-center justify-center relative cursor-pointer';
        cell.dataset.day = String(day);
        cell.dataset.year = String(calendarYear);
        cell.dataset.month = String(calendarMonth);
        if (level === 'heavy') cell.classList.add('day-heavy');
        else if (level === 'medium') cell.classList.add('day-medium');
        else if (level === 'light') cell.classList.add('day-light');
        else cell.classList.add('day-empty', 'hover:border-sky-200', 'hover:text-sky-500');
        if (isToday) cell.classList.add('ring-2', 'ring-sky-500', 'ring-offset-2');
        const span = document.createElement('span');
        span.className = isToday ? 'text-sm font-display font-bold text-sky-800' : 'text-sm font-display';
        span.textContent = String(day);
        cell.appendChild(span);
        if (level !== 'empty') {
          const icon = document.createElement('iconify-icon');
          icon.setAttribute('icon', 'lucide:check');
          icon.className = 'text-[10px] absolute bottom-1' + (level === 'heavy' ? '' : ' opacity-80');
          if (isToday) icon.classList.add('text-sky-700');
          cell.appendChild(icon);
        }
        grid.appendChild(cell);
      }
    }

    // Event Listeners Initialization
    document.addEventListener('DOMContentLoaded', () => {
      buildSessionsByDate();
      syncCalendarLabel();
      renderCalendarGrid();

      const section = document.getElementById('calendar-section');
      const btnPrev = document.getElementById('btn-prev-month');
      const btnNext = document.getElementById('btn-next-month');
      if (btnPrev) {
        btnPrev.addEventListener('click', () => {
          calendarMonth -= 1;
          if (calendarMonth < 1) {
            calendarMonth = 12;
            calendarYear -= 1;
          }
          syncCalendarLabel();
          renderCalendarGrid();
        });
      }
      if (btnNext) {
        btnNext.addEventListener('click', () => {
          calendarMonth += 1;
          if (calendarMonth > 12) {
            calendarMonth = 1;
            calendarYear += 1;
          }
          syncCalendarLabel();
          renderCalendarGrid();
        });
      }

      const grid = document.getElementById('calendar-days-grid');
      if (grid) {
        grid.addEventListener('click', (e) => {
          const cell = e.target.closest('.day-cell');
          if (!cell || !cell.dataset.day) return;
          const day = parseInt(cell.dataset.day, 10);
          const y = parseInt(cell.dataset.year || calendarYear, 10);
          const m = parseInt(cell.dataset.month || calendarMonth, 10);
          setTimeout(() => openDayDetails(cell, day, y, m), 50);
        });
      }

      document.getElementById('btn-close-modal').addEventListener('click', closeDayDetails);
      document.getElementById('modal-overlay').addEventListener('click', closeDayDetails);
    });
  </script>
</body>
</html>
