<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>热门榜单 - Linguify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
    h1, h2, .display { font-family: 'Outfit', sans-serif; }
  </style>
</head>
<body class="min-h-screen text-slate-800">
  <div class="max-w-6xl mx-auto px-6 py-8 pb-24">
    <header class="flex items-center justify-between mb-8">
      <div>
        <p class="text-sm text-sky-700 font-semibold">榜单页</p>
        <h1 id="list-title" class="text-3xl font-extrabold display">热门课程榜</h1>
        <p id="list-desc" class="text-sm text-slate-500 mt-1"></p>
      </div>
      <div class="flex gap-2 text-sm">
        <a href="course-market-highlights.html?view=weekly" class="px-4 py-2 rounded-xl bg-white border border-slate-200">本周榜</a>
        <a href="course-market-highlights.html?view=new" class="px-4 py-2 rounded-xl bg-white border border-slate-200">上新榜</a>
        <a href="course-workshop.html" class="px-4 py-2 rounded-xl bg-slate-900 text-white">返回工坊</a>
      </div>
    </header>

    <section class="bg-white border border-slate-100 rounded-3xl p-6 shadow-sm">
      <div id="ranking-list" class="space-y-3"></div>
    </section>
  </div>

  <script>
    (function () {
      const data = {
        weekly: {
          title: '本周热度榜',
          desc: '按完课率、收藏增速、购买转化综合计算。',
          items: [
            ['线性代数实战案例', 'course-market-course.html?course=linear-algebra-case'],
            ['商务英语口语进阶', 'course-market-course.html?course=business-english'],
            ['世界现代史专题', 'course-market-course.html?course=modern-world-history'],
            ['微积分从零到一', 'course-market-course.html?course=calc-zero-to-one']
          ]
        },
        new: {
          title: '上新冲榜课程',
          desc: '按最近 14 天新增课程的学习热度排序。',
          items: [
            ['AI 应用开发工作坊', 'course-market-course.html?course=ai-workshop'],
            ['化学实验设计与安全', 'course-market-course.html?course=chemistry-lab'],
            ['地理测绘与GIS入门', 'course-market-course.html?course=gis-basic'],
            ['西班牙语 B1 冲刺', 'course-market-course.html?course=spanish-b1']
          ]
        }
      };

      const view = new URL(window.location.href).searchParams.get('view') || 'weekly';
      const bucket = data[view] || data.weekly;

      document.title = `${bucket.title} - Linguify`;
      document.getElementById('list-title').textContent = bucket.title;
      document.getElementById('list-desc').textContent = bucket.desc;
      document.getElementById('ranking-list').innerHTML = bucket.items.map((item, idx) => `
        <a href="${item[1]}" class="flex items-center justify-between px-4 py-3 rounded-2xl bg-slate-50 hover:bg-sky-50 transition-colors">
          <div class="flex items-center gap-3">
            <span class="text-xl font-black text-slate-300">${String(idx + 1).padStart(2, '0')}</span>
            <span class="font-semibold">${item[0]}</span>
          </div>
          <span class="text-sm text-sky-700 font-semibold">查看</span>
        </a>
      `).join('');
    })();
  </script>
</body>
</html>
