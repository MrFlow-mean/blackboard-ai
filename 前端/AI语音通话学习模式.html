      const grade = raw.match(/(小学|初中|高中|大学|研究生|考研|初一|初二|初三|高一|高二|高三)/);
      if (grade && grade[1]) return grade[1];
      const weak = raw.match(/(基础很差|很差|很弱|薄弱|跟不上|听不懂)/);
      if (weak && weak[1]) return weak[1];
      return '';
    }

    function addClarifyNote(text) {
      const raw = (text || '').toString().trim();
      if (!raw) return;
      if (isCasualOnlyText(raw)) return;
      const metaOnly = /^(是|否|好|好的|可以|行|ok|okay|yes|no|y|n|取消|暂不|先不|等等|等一下|开始|继续)[!！。,.?？\s]*$/i;
      if (metaOnly.test(raw)) return;
      const boardCmdOnly = /^(生成(新的)?板书|生成(新的)?版书|开始生成|更新板书|更新版书|开始更新|写(一份|一个)?板书|做(一份|一个)?板书|出(一份|一个)?板书|开始上课|开始讲课)[!！。,.?？\s]*$/i;
      if (boardCmdOnly.test(raw)) return;
      clarifyState.notes.push(raw);
      if (clarifyState.notes.length > 10) {
        clarifyState.notes = clarifyState.notes.slice(-10);
      }
    }

    function updateClarifyStateFromUserText(text) {
      const raw = (text || '').toString().trim();
      if (!raw) return;
      addClarifyNote(raw);

      const topicCandidate = extractTopicCandidate(raw);
      if (topicCandidate) {
        if (!clarifyState.topic || topicCandidate.length >= clarifyState.topic.length) {
          clarifyState.topic = topicCandidate;
        }
      }

      const levelCandidate = extractLevelCandidate(raw);
      if (levelCandidate) {
        clarifyState.level = levelCandidate;
      }
      updateClarityUI();
    }

    function buildGoalTextFromClarify() {
      const lines = [];
      if (clarifyState.topic) lines.push(`学习目标：${clarifyState.topic}`);
      if (clarifyState.level) lines.push(`当前水平：${clarifyState.level}`);
      const extras = clarifyState.notes
        .filter(Boolean)
        .slice(-8);
      if (extras.length) {
        lines.push('补充信息：');
        extras.forEach(item => lines.push(`- ${item}`));
      }
      return lines.join('\n');
    }

    function calcClarityScore() {
      // Prefer PM analyzer score when available
      const pmScore = Number(sessionRuntime?.pm?.clarity_score);
      if (Number.isFinite(pmScore) && pmScore > 0) {
        return Math.max(0, Math.min(100, Math.round(pmScore)));
      }
      let score = 0;
      if (clarifyState.topic) score += 45;
      if (clarifyState.level) score += 20;
      const notesCount = Array.isArray(clarifyState.notes) ? clarifyState.notes.filter(Boolean).length : 0;
      if (notesCount >= 1) score += 8;
      if (notesCount >= 3) score += 7;
      const materialsLen = getMaterialsTextFromDom().trim().length;
      if (materialsLen >= 80) score += 10;
      if (materialsLen >= 240) score += 10;
      return Math.max(0, Math.min(100, score));
    }

    function updateClarityUI() {
      const bar = document.getElementById('clarity-score-bar');
      const text = document.getElementById('clarity-score-text');
      const value = calcClarityScore();
      if (bar) bar.style.width = `${value}%`;
      if (text) text.textContent = `${value}%`;
    }

    function getAttachmentPayloadForPm() {
      const atts = Array.isArray(sessionRuntime.attachments) ? sessionRuntime.attachments : [];
      return atts.slice(0, 10).map((a) => ({
        id: (a?.id || '').toString(),
        type: (a?.type || 'attachment').toString(),
        title: (a?.title || a?.filename || a?.name || '').toString(),
        extracted_text: (a?.extracted_text || '').toString(),
        summary: (a?.summary || '').toString(),
        key_points: Array.isArray(a?.key_points) ? a.key_points : []
      }));
    }

    async function runPmAnalyzeAndMaybeConfirm(latestUserText) {
      const text = (latestUserText || '').toString().trim();
      if (!text) return;
      if (boardState.board?.board_id) return;
      try {
        const resp = await fetch(`${BOARD_API_BASE}/pm-analyze`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_text: text,
            previous_spec: sessionRuntime?.pm?.learning_spec || null,
            attachments: getAttachmentPayloadForPm(),
            locale: voiceLang
          })
        });
        if (!resp.ok) {
          // PM 分析失败不阻塞主对话
          return;
        }
        const data = await resp.json().catch(() => ({}));
        if (!data.ok || !data.result) return;
        const r = data.result || {};
        sessionRuntime.pm.learning_spec = r.learning_spec || null;
        sessionRuntime.pm.pm_summary_bullets = Array.isArray(r.pm_summary_bullets) ? r.pm_summary_bullets : [];
        sessionRuntime.pm.clarity_score = Number(r.clarity_score) || 0;
        sessionRuntime.pm.ready_for_board = r.ready_for_board === true;
        sessionRuntime.pm.goal_text = (r.goal_text || '').toString();
        updateClarityUI();

        if (sessionRuntime.pm.ready_for_board) {
          const signature = JSON.stringify(sessionRuntime.pm.learning_spec || {});
          const goalText = sessionRuntime.pm.goal_text || buildGoalTextFromClarify();
          if (!confirmGenerateState.open) {
            openConfirmGenerateModal(signature, goalText);
          }
        }
      } catch (e) {
        // ignore
      }
    }

    function shouldProposeBoardCreate() {
      if (boardState.board) return false;
      if (!clarifyState.topic || !clarifyState.level) return false;
      if (calcClarityScore() < 80) return false;
      if (clarifyState.proposalPending) return false;
      const signature = `${clarifyState.topic}||${clarifyState.level}`;
      if (signature === clarifyState.lastProposalSignature) return false;
      return true;
    }

    const confirmGenerateState = {
      open: false,
      signature: '',
      goalText: ''
    };

    function openConfirmGenerateModal(signature, goalText) {
      const modal = document.getElementById('confirm-generate-modal');
      const desc = document.getElementById('confirm-generate-desc');
      if (!modal || !desc) return;
      confirmGenerateState.open = true;
      confirmGenerateState.signature = signature || '';
      confirmGenerateState.goalText = goalText || '';
      const pmBullets = Array.isArray(sessionRuntime?.pm?.pm_summary_bullets) ? sessionRuntime.pm.pm_summary_bullets : [];
      if (pmBullets.length) {
        desc.textContent = pmBullets.map(x => `- ${x}`).join('\n');
      } else {
        desc.textContent = voiceLang === 'en'
          ? `Topic: ${clarifyState.topic}\nLevel: ${clarifyState.level}`
          : `学习目标：${clarifyState.topic}\n当前水平：${clarifyState.level}`;
      }
      modal.classList.remove('hidden');
      // 锁滚动（简单处理）
      document.body.style.overflow = 'hidden';
    }

    function closeConfirmGenerateModal() {
      const modal = document.getElementById('confirm-generate-modal');
      if (!modal) return;
      modal.classList.add('hidden');
      confirmGenerateState.open = false;
      document.body.style.overflow = '';
    }

    async function resolveConfirmGenerateDecision(yes) {
      const goalText = confirmGenerateState.goalText
        || sessionRuntime?.pm?.goal_text
        || buildGoalTextFromClarify();
      closeConfirmGenerateModal();
      if (yes) {
        await runCreateBoardFlow(goalText);
        return;
      }
      clarifyState.proposalPending = false;
      pushSessionMessage('system', voiceLang === 'en'
        ? 'OK. You can continue adding details before generating the blackboard.'
        : '好的，你可以继续补充细节；准备好后再生成板书。');
    }

    function isExplicitBoardCreateRequest(text) {
      const raw = (text || '').toString().trim();
      if (!raw) return false;
      return /生成(新的)?板书|生成(新的)?版书|开始生成|写(一份|一个)?板书|做(一份|一个)?板书|出(一份|一个)?板书|开始上课|开始讲课|重新(创建|生成)板书|重建板书|再(生成|做)(一份|一个)?板书/i.test(raw);
    }

    function isExplicitBoardRecreateRequest(text) {
      const raw = (text || '').toString().trim();
      if (!raw) return false;
      return /重新(创建|生成)板书|重建板书|再(生成|做)(一份|一个)?板书/i.test(raw);
    }

    function isExplicitLessonTextRequest(text) {
      const raw = (text || '').toString().trim();
      if (!raw) return false;
      return /生成(一篇|一段)?课文|生成(一段|一篇)?对话|生成情景对话|生成(阅读)?课文原文|生成课文板书|来(一篇|一段)?课文|给我(一篇|一段)?课文|写(一篇|一段)?课文/i.test(raw);
    }

    function buildLessonTextUpdateRequest(userText) {
      const board = boardState.board;
      const outline = Array.isArray(board?.outline) ? board.outline : [];
      const nodeId = board?.progress?.current_node_id || outline[0]?.id || '';
      const nodeTitle = nodeId && outline.find(n => n.id === nodeId)?.title
        ? outline.find(n => n.id === nodeId).title
        : '';
      const goal = (board?.goal || '').toString().trim();
      const extras = clarifyState.notes.filter(Boolean).slice(-6);

      return [
        `用户请求：${(userText || '').toString().trim()}`,
        goal ? `当前黑板目标：${goal}` : '',
        nodeId ? `当前节点：${nodeId}${nodeTitle ? `（${nodeTitle}）` : ''}` : '',
        extras.length ? `补充信息（最近）：\n${extras.map(x => `- ${x}`).join('\n')}` : '',
        '任务：请把“完整课文/情景对话原文”写到黑板中（node.content 或新增节点的 content），必须给出可直接学习的原文文本（用 \\n 换行，分角色/分段），排版清晰，避免只给概述。',
        '如果当前黑板没有专门承载课文的节点，请新增一个节点（例如「完整情景对话课文」/「阅读课文原文」），并将其设为 teaching 作为当前讲解节点。'
      ].filter(Boolean).join('\n');
    }

    async function runCreateBoardFlow(goalText) {
      if (boardState.creatingBoard) return;
      const cleanGoal = (goalText || '').toString().trim();
      if (!cleanGoal) return;

      boardState.creatingBoard = true;
      clarifyState.proposalPending = false;
      clarifyState.lastProposalSignature = `${clarifyState.topic}||${clarifyState.level}`;
      try {
        pushSessionMessage('system', voiceLang === 'en' ? 'Generating blackboard...' : '正在生成板书...');
        const board = await createBoardFromGoal(cleanGoal);
        renderBoard(board);
        await bindBoardContextToVoice();
        const kickoffPrompt = buildTeachingKickoffPrompt(cleanGoal, board);
        await sendTextByPreferredTransport(kickoffPrompt);
      } catch (e) {
        console.error('生成板书失败:', e);
        window.alert(e?.message || voiceT('board_create_fail'));
      } finally {
        boardState.creatingBoard = false;
      }
    }

    async function runUpdateBoardFlow(userInput) {
      if (boardState.updatingBoard) return;
      const clean = (userInput || '').toString().trim();
      if (!clean) return;
      if (!boardState.board?.board_id) return;

      boardState.updatingBoard = true;
      try {
        pushSessionMessage('system', voiceLang === 'en' ? 'Updating blackboard...' : '正在更新板书...');
        const result = await updateBoardByUserInput(clean);
        if (result?.board) {
          renderBoard(result.board);
          await bindBoardContextToVoice();
          const prompt = voiceLang === 'en'
            ? 'The blackboard has been updated. Continue teaching from the current node. Do not paste the full lesson text again; focus on explanation and a short check question.'
            : '黑板已更新。请从当前节点继续讲解：不要把整段课文原文再粘贴一遍，重点做讲解与带练，并在本轮末尾给一个简短检查问题。';
          await sendTextByPreferredTransport(prompt);
        }
      } catch (e) {
        console.error('更新板书失败:', e);
        window.alert(e?.message || voiceT('board_update_fail'));
      } finally {
        boardState.updatingBoard = false;
      }
    }

    async function maybeTriggerBoardTaskByKeyword(userText) {
      const raw = (userText || '').toString().trim();
      if (!raw) return false;

      const wantsLesson = isExplicitLessonTextRequest(raw);
      const wantsCreate = isExplicitBoardCreateRequest(raw) || wantsLesson;
      const wantsRecreate = isExplicitBoardRecreateRequest(raw);

      if (!boardState.board) {
        if (!wantsCreate) return false;
        if (!clarifyState.topic || !clarifyState.level) {
          pushSessionMessage('system', voiceLang === 'en'
            ? 'To generate the blackboard, please clarify: what to learn + your current level.'
            : '要生成板书，请先把“学什么 + 当前水平”说清楚（你可以继续回答右侧的问题）。');
          return true;
        }
        await runCreateBoardFlow(buildGoalTextFromClarify());
        return true;
      }

      // 有板书后：默认永远不自动新开板书，而是“重构/更新当前板书”
      if (wantsRecreate) {
        const request = voiceLang === 'en'
          ? `User requests to "regenerate" the blackboard. DO NOT create a new board. Instead, refactor the CURRENT board: reorganize the structure if needed, rewrite nodes to match the clarified goal, and keep it concise.\nUser request: ${raw}`
          : `用户说“重新生成/重建板书”。注意：不要新开板书，请在【当前板书】基础上进行重构与重写：必要时调整节点结构，补全/精炼内容，使其更贴合学习目标。\n用户原话：${raw}`;
        await runUpdateBoardFlow(request);
        return true;
      }

      // 用户在已有板书时说“生成板书/开始上课”等：解释为更新/补全当前板书
      if (wantsCreate) {
        const request = voiceLang === 'en'
          ? `User asks to generate a blackboard but one already exists. Do NOT create a new board. Update and enrich the CURRENT board based on user goal and latest constraints.\nUser request: ${raw}`
          : `用户要求“生成板书/开始上课”，但当前已存在板书。不要新开板书，请基于【当前板书】进行补全与更新，使其更贴合最新需求。\n用户原话：${raw}`;
        await runUpdateBoardFlow(request);
        return true;
      }

      if (boardState.board && wantsLesson) {
        const request = buildLessonTextUpdateRequest(raw);
        await runUpdateBoardFlow(request);
        return true;
      }

      return false;
    }

    function summarizeBoardForTutor(board) {
      const safeBoard = board && typeof board === 'object' ? board : {};
      const outline = Array.isArray(safeBoard.outline) ? safeBoard.outline : [];
      const currentNodeId = (safeBoard.progress && safeBoard.progress.current_node_id)
        ? String(safeBoard.progress.current_node_id)
        : (outline[0] && outline[0].id ? String(outline[0].id) : '');
      const currentNode = outline.find(node => String(node.id) === currentNodeId) || outline[0] || null;
      const nodeMap = safeBoard.nodes && typeof safeBoard.nodes === 'object' ? safeBoard.nodes : {};
      const currentNodeContent = currentNode && nodeMap[currentNode.id]
        ? String(nodeMap[currentNode.id].content || '').trim()
        : '';
      const outlineSummary = outline
        .slice(0, 8)
        .map((node, index) => `${index + 1}. [${node.id}] ${node.title} (${node.status || 'pending'})`)
        .join('\n');

      return {
        boardId: String(safeBoard.board_id || ''),
        boardGoal: String(safeBoard.goal || '').trim(),
        currentNodeId: currentNode ? String(currentNode.id || '') : '',
        outlineSummary,
        currentNodeContent: currentNodeContent.slice(0, 500)
      };
    }

    function buildTeachingKickoffPrompt(userGoal, board) {
      const summary = summarizeBoardForTutor(board);
      const goal = String(userGoal || '').trim();
      if (voiceLang === 'en') {
        return [
          'Start a classroom-style lesson based on the provided blackboard.',
          `User learning goal: ${goal}`,
          `Blackboard goal: ${summary.boardGoal || goal}`,
          `Board ID: ${summary.boardId || 'N/A'}`,
          `Current node: ${summary.currentNodeId || 'N/A'}`,
          'Blackboard outline:',
          summary.outlineSummary || 'N/A',
          'Current node content:',
          summary.currentNodeContent || 'N/A',
          'Requirements:',
          '- Start teaching from the current node now.',
          '- Keep all explanations aligned with the blackboard structure.',
          '- End this turn with one short check question for the learner.'
        ].join('\n');
      }

      return [
        '请基于已生成黑板，开启课堂式讲解。',
        `用户学习目标：${goal}`,
        `黑板目标：${summary.boardGoal || goal}`,
        `黑板ID：${summary.boardId || 'N/A'}`,
        `当前节点：${summary.currentNodeId || 'N/A'}`,
        '黑板大纲：',
        summary.outlineSummary || 'N/A',
        '当前节点内容：',
        summary.currentNodeContent || 'N/A',
        '要求：',
        '- 先从当前节点开始讲解。',
        '- 讲解必须围绕黑板结构展开。',
        '- 本轮末尾给学习者一个简短检查问题。'
      ].join('\n');
    }

    async function updateBoardByUserInput(userInput) {
      if (!boardState.board?.board_id) return null;
      const response = await fetch(`${BOARD_API_BASE}/update-board`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          board_id: boardState.board.board_id,
          user_input: userInput,
          trigger_source: 'user_input',
          confirmed: true,
          locale: voiceLang
        })
      });
      if (!response.ok) {
        const message = await readHttpErrorMessage(response, voiceT('board_update_fail'));
        throw new Error(message);
      }
      const data = await response.json();
      if (!data.ok || !data.board) {
        throw new Error(data.message || voiceT('board_update_fail'));
      }
      markSessionActivity();
      if (data.patch && Array.isArray(data.patch.operations) && data.patch.operations.length) {
        sessionRuntime.boardChanges.push({
          ts: new Date().toISOString(),
          rationale: data.patch.rationale || '',
          operations: data.patch.operations
        });
      }
      return {
        board: data.board,
        patch: data.patch || null
      };
    }

    async function updateAttentionScopeBySnippet(snippet, sourceId = 'materials') {
      if (!boardState.board?.board_id) {
        throw new Error(voiceLang === 'en' ? 'No board yet.' : '尚未生成板书，无法扩展注意力范围。');
      }
      const response = await fetch(`${BOARD_API_BASE}/update-attention-scope`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          board_id: boardState.board.board_id,

        })

      if (!response.ok) {
        const message = await readHttpErrorMessage(response, voiceLang === 'en' ? 'Failed to update attention scope.' : '更新注意力范围失败。');
        throw new Error(message);
      }
      const data = await response.json().catch(() => ({}));
      if (!data.ok || !data.board) {

    const backendCaps = {
      loaded: false,
      hasOpenAIKey: false,
      hasOpenRouterKey: false
    };

    const voiceFallback = {
      enabled: false, // 统一聊天中的语音输入开关（语音识别 -> 文本）
      listening: false,
      recognition: null,
      lastTranscript: '',
      // 默认关闭浏览器朗读器（你要的是 OpenAI Realtime 真语音）
      speakEnabled: false,
      skipNextTts: false
    };

    function mimeFromAudioFormat(format) {
      const fmt = (format || '').toString().toLowerCase();
      if (fmt === 'mp3' || fmt === 'mpeg') return 'audio/mpeg';
      if (fmt === 'wav' || fmt === 'wave') return 'audio/wav';
      if (fmt === 'ogg' || fmt === 'opus') return 'audio/ogg';
      return 'audio/wav';
    }

    function base64ToBytes(base64) {
      const bin = atob(base64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    function bytesToBase64(bytes) {
      let binary = '';
      const chunkSize = 0x8000;
      for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
      }
      return btoa(binary);
    }

    // ==================== OpenAI Realtime 真语音（PCM16） ====================
    const REALTIME_SAMPLE_RATE = 24000;
    const REALTIME_PROCESSOR_BUFFER_SIZE = 4096;

    const realtimeVoice = {
      recording: false,
      stream: null,
      audioContext: null,
      sourceNode: null,
      processorNode: null,
      inputSampleRate: 0,
      playbackContext: null,
      playbackNextTime: 0,
      currentResponseHadAudio: false
    };

    function downsampleFloat32(input, inputRate, targetRate) {
      if (!input || !input.length) return new Float32Array(0);
      if (!inputRate || inputRate === targetRate) return input;
      const ratio = inputRate / targetRate;
      const newLength = Math.floor(input.length / ratio);
      const result = new Float32Array(newLength);
      let offsetResult = 0;
      let offsetBuffer = 0;
      while (offsetResult < result.length) {
        const nextOffsetBuffer = Math.floor((offsetResult + 1) * ratio);
        let sum = 0;
        let count = 0;
        for (let i = offsetBuffer; i < nextOffsetBuffer && i < input.length; i++) {
          sum += input[i];
          count++;
        }
        result[offsetResult] = count ? (sum / count) : 0;
        offsetResult++;
        offsetBuffer = nextOffsetBuffer;
      }
      return result;
    }

    function float32ToPcm16Bytes(float32) {
      const buffer = new ArrayBuffer(float32.length * 2);
      const view = new DataView(buffer);
      for (let i = 0; i < float32.length; i++) {
        let s = float32[i];
        s = Math.max(-1, Math.min(1, s));
        view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7fff, true);
      }
      return new Uint8Array(buffer);
    }

    function base64ToInt16Array(base64) {
      const bytes = base64ToBytes(base64);
      const len = Math.floor(bytes.length / 2);
      const out = new Int16Array(len);
      const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
      for (let i = 0; i < len; i++) {
        out[i] = view.getInt16(i * 2, true);
      }
      return out;
    }

    function ensureRealtimePlaybackContext() {
      if (realtimeVoice.playbackContext && realtimeVoice.playbackContext.state !== 'closed') {
        return realtimeVoice.playbackContext;
      }
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      try {
        realtimeVoice.playbackContext = new Ctx({ sampleRate: REALTIME_SAMPLE_RATE });
      } catch (e) {
        realtimeVoice.playbackContext = new Ctx();
      }
      realtimeVoice.playbackNextTime = 0;
      return realtimeVoice.playbackContext;
    }

    async function unlockRealtimePlayback() {
      const ctx = ensureRealtimePlaybackContext();
      if (!ctx) return;
      if (ctx.state === 'suspended') {
        try { await ctx.resume(); } catch (e) { /* ignore */ }
      }
    }

    function playOpenAIRealtimePcm16Delta(base64Pcm16) {
      const b64 = (base64Pcm16 || '').toString().trim();
      if (!b64) return;
      const ctx = ensureRealtimePlaybackContext();
      if (!ctx) return;
      unlockRealtimePlayback();

      const pcm16 = base64ToInt16Array(b64);
      if (!pcm16.length) return;
      const float32 = new Float32Array(pcm16.length);
      for (let i = 0; i < pcm16.length; i++) {
        float32[i] = pcm16[i] / 0x8000;
      }

      const buffer = ctx.createBuffer(1, float32.length, REALTIME_SAMPLE_RATE);
      buffer.getChannelData(0).set(float32);
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.connect(ctx.destination);

      const now = ctx.currentTime;
      const startAt = Math.max(now, realtimeVoice.playbackNextTime || now);
      source.start(startAt);
      realtimeVoice.playbackNextTime = startAt + buffer.duration;
    }

    function cleanupRealtimeMic() {
      try { realtimeVoice.processorNode?.disconnect?.(); } catch (e) { /* ignore */ }
      try { realtimeVoice.sourceNode?.disconnect?.(); } catch (e) { /* ignore */ }
      realtimeVoice.processorNode = null;
      realtimeVoice.sourceNode = null;

      if (realtimeVoice.stream) {
        try { realtimeVoice.stream.getTracks().forEach(track => track.stop()); } catch (e) { /* ignore */ }
      }
      realtimeVoice.stream = null;

      if (realtimeVoice.audioContext && realtimeVoice.audioContext.state !== 'closed') {
        try { realtimeVoice.audioContext.close(); } catch (e) { /* ignore */ }
      }
      realtimeVoice.audioContext = null;
      realtimeVoice.inputSampleRate = 0;
    }

    async function startOpenAIRealtimeVoiceCall() {
      await loadBackendCaps();
      if (!backendCaps.hasOpenAIKey) {
        window.alert(voiceLang === 'en'
          ? 'OpenAI Realtime voice requires OPENAI_API_KEY on backend.'
          : 'OpenAI Realtime 真语音需要后端配置 OPENAI_API_KEY。');
        return;
      }
      if (realtimeVoice.recording) return;
      // 允许先开启实时语音聊天：用户可以先用语音提出问题/目标，后续再触发生成黑板并绑定讲师上下文

      // 停止浏览器语音识别，避免抢麦
      if (voiceFallback.listening) {
        try { voiceFallback.recognition?.stop?.(); } catch (e) { /* ignore */ }
        voiceFallback.listening = false;
      }

      realtimeVoice.recording = true;
      realtimeVoice.currentResponseHadAudio = false;
      voiceFallback.speakEnabled = false; // 使用 Realtime 真音频，不用浏览器朗读
      updateVoiceButtonUI();

      await unlockRealtimePlayback();
      // 每次启动语音会话，先把模型切到“澄清引导员”模式（无板书时尤其重要）
      await setRealtimeClarificationMode();
      // 有黑板时绑定上下文；没有也可正常通话
      await bindBoardContextToVoice();
      await ensureRealtimeSocket();

      const stream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
      });
      realtimeVoice.stream = stream;

      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) {
        throw new Error(voiceLang === 'en' ? 'AudioContext is not supported in this browser.' : '当前浏览器不支持 AudioContext。');
      }
      const audioContext = new Ctx();
      realtimeVoice.audioContext = audioContext;
      realtimeVoice.inputSampleRate = audioContext.sampleRate || 48000;
      if (audioContext.state === 'suspended') {
        try { await audioContext.resume(); } catch (e) { /* ignore */ }
      }

      const sourceNode = audioContext.createMediaStreamSource(stream);
      realtimeVoice.sourceNode = sourceNode;

      const processor = audioContext.createScriptProcessor(REALTIME_PROCESSOR_BUFFER_SIZE, 1, 1);
      realtimeVoice.processorNode = processor;

      const silentGain = audioContext.createGain();
      silentGain.gain.value = 0;

      processor.onaudioprocess = (event) => {
        try {
          if (!realtimeVoice.recording) return;
          const ws = boardState.ws;
          if (!ws || ws.readyState !== WebSocket.OPEN) return;
          const input = event.inputBuffer.getChannelData(0);
          const downsampled = downsampleFloat32(input, realtimeVoice.inputSampleRate, REALTIME_SAMPLE_RATE);
          const pcm16Bytes = float32ToPcm16Bytes(downsampled);
          const audioBase64 = bytesToBase64(pcm16Bytes);
          ws.send(JSON.stringify({ type: 'audio_data', audio: audioBase64 }));
        } catch (e) {
          // ignore chunk errors
        }
      };

      sourceNode.connect(processor);
      processor.connect(silentGain);
      silentGain.connect(audioContext.destination);
    }

    async function maybeBootstrapBoardFromVoiceText(text) {
      const clean = (text || '').toString().trim();
      if (!clean) return;
      updateClarifyStateFromUserText(clean);

      // 语音里直接说“生成板书/生成课文”等关键词：硬触发交给黑板文本模型
      if (await maybeTriggerBoardTaskByKeyword(clean)) {
        return;
      }

      // 没有黑板时：调用 PM 分析器产出 LearningSpec/总结/ready
      await runPmAnalyzeAndMaybeConfirm(clean);
    }

    async function stopOpenAIRealtimeVoiceCall() {
      if (!realtimeVoice.recording) return;
      realtimeVoice.recording = false;
      updateVoiceButtonUI();
      try {
        const ws = boardState.ws;
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'audio_end' }));
        }
      } catch (e) {
        // ignore
      } finally {
        cleanupRealtimeMic();
      }
    }

    function forceStopOpenAIRealtimeVoiceCall() {
      realtimeVoice.recording = false;
      try {
        const ws = boardState.ws;
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'audio_end' }));
        }
      } catch (e) {
        // ignore
      }
      cleanupRealtimeMic();
    }

    function playServerAudio(audioBase64, format) {
      const b64 = (audioBase64 || '').toString().trim();
      if (!b64) return;
      const mime = mimeFromAudioFormat(format);
      const bytes = base64ToBytes(b64);
      const blob = new Blob([bytes], { type: mime });
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.onended = () => URL.revokeObjectURL(url);
      audio.onerror = () => URL.revokeObjectURL(url);
      audio.play().catch(() => {
        URL.revokeObjectURL(url);
      });
    }

    function normalizeSpeakText(text) {
      return (text || '')
        .toString()
        .replace(/^\[(?:Node|节点)\s*:?\s*[0-9A-Za-z_-]+\]\s*/i, '')
        .trim();
    }

    function speakText(text) {
      const content = normalizeSpeakText(text);
      if (!content) return;
      // 统一禁用浏览器朗读器（避免“无障碍朗读器”那种机械音）
      return;
      if (!window.speechSynthesis) return;
      try {
        window.speechSynthesis.cancel();
      } catch (e) {
        // ignore
      }
      const utterance = new SpeechSynthesisUtterance(content);
      utterance.lang = voiceLang === 'en' ? 'en-US' : 'zh-CN';
      utterance.rate = 1.0;
      utterance.pitch = 1.0;
      utterance.volume = 1.0;
      window.speechSynthesis.speak(utterance);
    }

    function maybeSpeakAi(text) {
      if (!voiceFallback.enabled || !voiceFallback.speakEnabled) return;
      // 当后端具备 OpenAI Realtime 时，优先使用 Realtime 真语音（response.audio.delta），不再用浏览器朗读器
      if (backendCaps.hasOpenAIKey) return;
      speakText(text);
    }

      const voiceBtn = document.getElementById('voice-chat-btn');
      const missingKey = backendCaps.loaded && !backendCaps.hasOpenAIKey && !backendCaps.hasOpenRouterKey;

          micBtn.setAttribute('aria-label', label);

          micBtn.classList.add('text-rose-500', 'bg-rose-50');
          micBtn.title = label;
          micBtn.setAttribute('aria-label', label);
          if (iconEl) iconEl.setAttribute('icon', 'lucide:mic');
        } else {
          const label = voiceT('voice_mic_idle');
          micBtn.title = label;
          micBtn.setAttribute('aria-label', label);
          if (iconEl) iconEl.setAttribute('icon', 'lucide:mic');

      }

      if (voiceBtn) {
        voiceBtn.disabled = false;
        voiceBtn.classList.remove('opacity-60', 'cursor-not-allowed', 'bg-slate-400', 'hover:bg-slate-400', 'bg-rose-500', 'hover:bg-rose-600', 'bg-sky-500', 'hover:bg-sky-600');

        if (missingKey) {
          voiceBtn.disabled = true;
          voiceBtn.textContent = voiceLang === 'en'
            ? 'Voice unavailable (no API key)'

        } else if (backendCaps.loaded && backendCaps.hasOpenAIKey && realtimeVoice.recording) {
          voiceBtn.textContent = voiceT('voice_chat_btn_listening');
          voiceBtn.classList.add('bg-rose-500', 'hover:bg-rose-600');
        } else if ((!backendCaps.loaded || !backendCaps.hasOpenAIKey) && voiceFallback.listening) {

          voiceBtn.textContent = voiceT('voice_chat_btn_listening');
          voiceBtn.classList.add('bg-rose-500', 'hover:bg-rose-600');

    async function loadBackendCaps() {
      if (backendCaps.loaded) return backendCaps;
      try {
        await ensureBackendReachable();
        const resp = await fetch(`${BOARD_API_BASE}/health`);
        const data = await resp.json().catch(() => ({}));
        backendCaps.hasOpenAIKey = !!data.has_openai_key;
        backendCaps.hasOpenRouterKey = !!data.has_openrouter_key;
      } catch (e) {
        // ignore
      } finally {
        backendCaps.loaded = true;
        // 保持按钮可点击，具体可用性在点击后提示/后端报错
        voiceFallback.enabled = true;
        updateVoiceButtonUI();
      }
      return backendCaps;
    }

    function ensureSpeechRecognition() {
      if (voiceFallback.recognition) return voiceFallback.recognition;
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return null;
      const rec = new SR();
      rec.lang = voiceLang === 'en' ? 'en-US' : 'zh-CN';
      rec.continuous = false;
      rec.interimResults = false;
      rec.maxAlternatives = 1;
      rec.onresult = async (event) => {
        try {
          const transcript = event?.results?.[0]?.[0]?.transcript || '';
          const clean = (transcript || '').trim();
          voiceFallback.lastTranscript = clean;
          if (clean) {
            await handleChatSendText(clean);
          }
        } finally {
          voiceFallback.listening = false;
          updateVoiceButtonUI();
        }
      };
      rec.onerror = () => {
        voiceFallback.listening = false;
        updateVoiceButtonUI();
      };
      rec.onend = () => {
        voiceFallback.listening = false;
        updateVoiceButtonUI();
      };
      voiceFallback.recognition = rec;
      return rec;
    }

    async function toggleVoiceFallback() {
      await loadBackendCaps();
      const missingKey = backendCaps.loaded && !backendCaps.hasOpenAIKey && !backendCaps.hasOpenRouterKey;
      if (missingKey) {
        window.alert(voiceLang === 'en'
          ? 'Voice is unavailable because no API key is configured.'
          : '语音不可用：未配置可用的 API Key。');
        return;
      }
      voiceFallback.enabled = true;
      const rec = ensureSpeechRecognition();
      if (!rec) {
        window.alert(voiceLang === 'en'
          ? 'SpeechRecognition is not supported in this browser. Please use Chrome/Edge and open via http://localhost.'
          : '当前浏览器不支持语音识别。请使用 Chrome/Edge，并尽量通过 http://localhost 打开页面。');
        return;
      }
      if (voiceFallback.listening) {
        try { rec.stop(); } catch (e) { /* ignore */ }
        voiceFallback.listening = false;
        updateVoiceButtonUI();
        return;
      }
      voiceFallback.listening = true;
      updateVoiceButtonUI();
      try {
        rec.start();
      } catch (e) {
        voiceFallback.listening = false;
        updateVoiceButtonUI();
      }
    }

    async function sendTextViaHttpFallback(text) {
      const response = await fetch(`${BOARD_API_BASE}/chat-text`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text,
          board_id: boardState.board?.board_id || '',
          locale: voiceLang
        })
      });
      if (!response.ok) {
        const message = await readHttpErrorMessage(response, voiceT('board_create_fail'));
        throw new Error(message);
      }
      const data = await response.json().catch(() => ({}));
      if (!data.ok) {
        throw new Error(data.message || '模型调用失败');
      }

      const aiText = (data.text || '').toString().trim();
      if (data.audio_base64) {
        // 使用模型直出音频，关闭浏览器 TTS 避免重复播放
        voiceFallback.speakEnabled = false;
        playServerAudio(data.audio_base64, data.format);
      } else {
        // 没有音频就只显示文字，不再用浏览器朗读器
        voiceFallback.speakEnabled = false;
      }

      if (aiText) {
        pushSessionMessage('assistant', aiText);
      }
    }

    async function sendTextByPreferredTransport(text) {
      try {
        await bindBoardContextToVoice();
        const ws = await ensureRealtimeSocket();
        realtimeVoice.currentResponseHadAudio = false;
        if (backendCaps.hasOpenAIKey) {
          // 有 Realtime 真音频时，不再用浏览器朗读
          voiceFallback.speakEnabled = false;
          await unlockRealtimePlayback();
        }
        ws.send(JSON.stringify({
          type: 'text_message',
          text
        }));
        return 'ws';
      } catch (wsError) {
        console.warn('WebSocket 发送失败，回退 HTTP /chat-text:', wsError);
        await sendTextViaHttpFallback(text);
        return 'http';
      }
    }

    async function handleChatSendText(text) {
      const cleanText = (text || '').toString().trim();
      if (!cleanText) return;
      pushSessionMessage('user', cleanText);
      updateClarifyStateFromUserText(cleanText);

      try {
        // 如果用户在对 action card 口头回复“是/否”，自动触发对应决策
        const pendingCreate = getLatestUnresolvedActionCard('create_board');
        if (pendingCreate && (isAffirmativeText(cleanText) || isNegativeText(cleanText))) {
          await handleActionCardDecision(pendingCreate, isAffirmativeText(cleanText));
          return;
        }
        const pendingUpdate = getLatestUnresolvedActionCard('update_board');
        if (pendingUpdate && (isAffirmativeText(cleanText) || isNegativeText(cleanText))) {
          await handleActionCardDecision(pendingUpdate, isAffirmativeText(cleanText));
          return;
        }

        // 文字里命中“生成板书/生成课文”等关键词：硬触发交给黑板文本模型
        if (await maybeTriggerBoardTaskByKeyword(cleanText)) {
          return;
        }

        if (!boardState.board) {
          // 澄清阶段：让 Realtime PM 继续对话，同时并行调用 PM 分析器来决定何时 ready
          await sendTextByPreferredTransport(cleanText);
          await runPmAnalyzeAndMaybeConfirm(cleanText);
          return;
        }

        if (isBoardUpdateIntent(cleanText)) {
          // 有板书后默认自动更新（先写黑板，再讲解），不再要求二次确认
          await runUpdateBoardFlow(cleanText);
          return;
        }

        // 有板书时：更广义的“需求补充”也先自动写进黑板，避免讲师跑在黑板前面
        if (shouldAutoUpdateBoardFirst(cleanText)) {
          await runUpdateBoardFlow(cleanText);
          return;
        }

        await sendTextByPreferredTransport(cleanText);
      } catch (error) {
        console.error('黑板流程失败:', error);
        window.alert(error.message || voiceT('board_create_fail'));
      }
    }

    async function ensureRealtimeSocket() {
      if (boardState.ws && boardState.ws.readyState === WebSocket.OPEN) {
        return boardState.ws;
      }
      await ensureBackendReachable();
      return new Promise((resolve, reject) => {
        const ws = new WebSocket(BOARD_WS_URL);
        boardState.ws = ws;
        ws.onopen = () => resolve(ws);
        ws.onerror = (event) => reject(event);
        ws.onmessage = (event) => {
          try {
            const payload = JSON.parse(event.data);
            if (payload.type === 'realtime_event') {
              const evt = payload.event || {};
              if (evt.type === 'error') {
                const msg = (evt?.error?.message || evt?.message || '').toString().trim() || (voiceLang === 'en'
                  ? 'OpenAI Realtime error. Check backend logs for details.'
                  : 'OpenAI Realtime 返回错误，请查看后端日志。');
                console.error('Realtime event error:', evt);
                pushSessionMessage('system', msg);
                window.alert(msg);
                sessionRuntime.aiDeltaBuffer = '';
                return;
              }

              if (evt.type === 'response.audio_transcript.delta' || evt.type === 'response.text.delta') {
                const channel = evt.type.includes('audio_transcript') ? 'audio_transcript' : 'text';
                if (!sessionRuntime.aiTextChannel) sessionRuntime.aiTextChannel = channel;
                if (sessionRuntime.aiTextChannel !== channel) {
                  // 忽略另一条文本通道，避免重复
                  return;
                }
                const text = normalizeDeltaText(evt);
                sessionRuntime.aiDeltaBuffer += text;
                const match = text.match(/\[(?:Node|节点)\s*:?\s*([0-9A-Za-z_-]+)\]/i);
                if (match && match[1]) {
                  setCurrentNode(match[1]);
                }
              } else if (evt.type === 'response.audio.delta') {
                // OpenAI Realtime 真音频输出（PCM16 base64）
                if (evt.delta) {
                  realtimeVoice.currentResponseHadAudio = true;
                  voiceFallback.speakEnabled = false;
                  playOpenAIRealtimePcm16Delta(evt.delta);
                }
              } else if (evt.type === 'response.audio_transcript.done' || evt.type === 'response.text.done') {
                const channel = evt.type.includes('audio_transcript') ? 'audio_transcript' : 'text';
                if (!sessionRuntime.aiTextChannel) sessionRuntime.aiTextChannel = channel;
                if (sessionRuntime.aiTextChannel !== channel) {
                  // 忽略另一条文本通道，避免重复
                  return;
                }
                const doneText = normalizeDoneText(evt);
                sessionRuntime.aiDoneText = doneText;
                if (doneText) {
                  const match = doneText.match(/\[(?:Node|节点)\s*:?\s*([0-9A-Za-z_-]+)\]/i);
                  if (match && match[1]) {
                    setCurrentNode(match[1]);
                  }
                }
              } else if (evt.type === 'conversation.item.input_audio_transcription.completed') {
                const transcript = evt.transcript
                  || evt?.item?.content?.find?.(part => part.transcript)?.transcript
                  || '';
                if (transcript) {
                  pushSessionMessage('user', transcript);
                  // 允许用户先语音表达学习目标/问题，再自动生成黑板并绑定讲师
                  if (isAffirmativeText(transcript) || isNegativeText(transcript)) {
                    const pendingCreate = getLatestUnresolvedActionCard('create_board');
                    if (pendingCreate) {
                      handleActionCardDecision(pendingCreate, isAffirmativeText(transcript));
                      return;
                    }
                    const pendingUpdate = getLatestUnresolvedActionCard('update_board');
                    if (pendingUpdate) {
                      handleActionCardDecision(pendingUpdate, isAffirmativeText(transcript));
                      return;
                    }
                  }
                  maybeBootstrapBoardFromVoiceText(transcript);
                }
              } else if (evt.type === 'response.done') {
                const doneText = (sessionRuntime.aiDoneText || '').trim();
                if (shouldAppendDoneText(doneText, sessionRuntime.aiDeltaBuffer)) {
                  sessionRuntime.aiDeltaBuffer += (sessionRuntime.aiDeltaBuffer ? '' : '') + doneText;
                }
                const finalAiText = sessionRuntime.aiDeltaBuffer.trim();
                if (finalAiText) {
                  pushSessionMessage('assistant', finalAiText);
                  if (voiceFallback.skipNextTts) {
                    voiceFallback.skipNextTts = false;
                  } else if (!realtimeVoice.currentResponseHadAudio) {
                    maybeSpeakAi(finalAiText);
                  }
                }
                sessionRuntime.aiDeltaBuffer = '';
                sessionRuntime.aiDoneText = '';
                sessionRuntime.aiTextChannel = '';
                realtimeVoice.currentResponseHadAudio = false;
              }
            } else if (payload.type === 'board_context_bound' && payload.board) {
              renderBoard(payload.board);
            } else if (payload.type === 'current_node_updated' && payload.node_id) {
              setCurrentNode(payload.node_id);
            } else if (payload.type === 'audio_output') {
              // 模型直出音频：播放音频，并避免浏览器 TTS 重复朗读
              voiceFallback.speakEnabled = false;
              voiceFallback.skipNextTts = true;
              playServerAudio(payload.audio_base64, payload.format);
            } else if (payload.type === 'error') {
              const msg = (payload.message || '').toString().trim() || '服务端返回错误';
              console.error('WS错误:', msg);
              window.alert(msg);
            }
          } catch (e) {
            // ignore
          }
        };
      });
    }

      async function handleChatUploadFile(file, kind) {
        const f = file;
        if (!f) return;
        const name = (f.name || '').toString();
        const type = (f.type || '').toString().toLowerCase();
        const isImage = kind === 'image' || type.startsWith('image/') || /\.(png|jpe?g|webp|gif)$/i.test(name);
        const isText = kind === 'file' || /^text\//.test(type) || /\.(txt|md)$/i.test(name);

        if (isImage) {
          try {
            pushSessionMessage('system', voiceLang === 'en' ? 'Recognizing image...' : '正在识别图片文字...');
            const arrayBuffer = await f.arrayBuffer();
            const bytes = new Uint8Array(arrayBuffer);
            let binary = '';
            const chunkSize = 0x8000;
            for (let i = 0; i < bytes.length; i += chunkSize) {
              binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
            }
            const b64 = btoa(binary);
            const resp = await fetch(`${BOARD_API_BASE}/vision-extract`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                image_base64: b64,
                mime: type || 'image/png',
                filename: name,
                locale: voiceLang
              })
            });
            if (!resp.ok) {
              const msg = await readHttpErrorMessage(resp, voiceLang === 'en' ? 'Image recognition failed.' : '图片识别失败。');
              throw new Error(msg);
            }
            const data = await resp.json().catch(() => ({}));
            if (!data.ok || !data.result) {
              throw new Error(data.message || (voiceLang === 'en' ? 'Image recognition failed.' : '图片识别失败。'));
            }
            const result = data.result || {};
            const extracted = (result.extracted_text || '').toString().trim();
            const summary = (result.summary || '').toString().trim();
            const points = Array.isArray(result.key_points) ? result.key_points.filter(Boolean) : [];
            addAttachmentRecord({
              id: `img_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
              type: 'image',
              title: name || (voiceLang === 'en' ? 'Image' : '图片'),
              filename: name,
              extracted_text: extracted,
              summary,
              key_points: points.slice(0, 12),
              created_at: new Date().toISOString()
            });
            const block = [
              `【附件图片识别】${name || (voiceLang === 'en' ? 'Image' : '图片')}`,
              extracted ? `---\n${extracted}` : (voiceLang === 'en' ? '(No text detected)' : '（未识别到明显文字）'),
              summary ? `---\n摘要：${summary}` : '',
              points.length ? `要点：\n${points.slice(0, 8).map(p => `- ${p}`).join('\n')}` : ''
            ].filter(Boolean).join('\n');
            await addTextToMaterials(block);
            pushSessionMessage('system', voiceLang === 'en' ? 'Image added to materials.' : '已将图片识别结果加入材料区。');
          } catch (e) {
            window.alert(e?.message || (voiceLang === 'en' ? 'Image recognition failed.' : '图片识别失败。'));
          }
          return;
        }

        if (isText) {
          try {
            const text = await f.text();
            addAttachmentRecord({
              id: `file_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
              type: 'file',
              title: name || (voiceLang === 'en' ? 'File' : '文件'),
              filename: name,
              extracted_text: text.trim(),
              summary: '',
              key_points: [],
              created_at: new Date().toISOString()
            });
            const block = `【附件文件】${name || (voiceLang === 'en' ? 'File' : '文件')}\n---\n${text.trim()}`;
            await addTextToMaterials(block);
            pushSessionMessage('system', voiceLang === 'en' ? 'File added to materials.' : '已将文件内容加入材料区。');
          } catch (e) {
            window.alert(e?.message || (voiceLang === 'en' ? 'Failed to read file.' : '读取文件失败。'));
          }
          return;
        }

        window.alert(voiceLang === 'en'
          ? 'Unsupported file type. Please upload .txt/.md or an image.'
          : '暂不支持该文件类型，请上传 .txt/.md 或图片文件。');
      }

      if (uploadImageBtn && uploadImageInput) {
        uploadImageBtn.addEventListener('click', (event) => {
          event.stopPropagation();
          if (plusMenu) plusMenu.classList.add('hidden');
          uploadImageInput.click();
        });
        uploadImageInput.addEventListener('change', async () => {
          const file = uploadImageInput.files?.[0];
          uploadImageInput.value = '';
          if (!file) return;
          await handleChatUploadFile(file, 'image');
        });
      }

      if (uploadFileBtn && uploadFileInput) {
        uploadFileBtn.addEventListener('click', (event) => {
          event.stopPropagation();
          if (plusMenu) plusMenu.classList.add('hidden');
          uploadFileInput.click();
        });
        uploadFileInput.addEventListener('change', async () => {
          const file = uploadFileInput.files?.[0];
          uploadFileInput.value = '';
          if (!file) return;
          await handleChatUploadFile(file, 'file');
        });
      }

      if (bbEditBtn) {
        bbEditBtn.addEventListener('click', (event) => {
          event.stopPropagation();
          beginBlackboardEdit();
        });
      }
      if (bbSaveSelectionBtn) {
        bbSaveSelectionBtn.addEventListener('pointerdown', (event) => {
          event.preventDefault();
          event.stopPropagation();
          saveBlackboardSelectionToNotebook();
        });
        bbSaveSelectionBtn.addEventListener('keydown', (event) => {
          if (event.key !== 'Enter' && event.key !== ' ') return;
          event.preventDefault();
          event.stopPropagation();
          saveBlackboardSelectionToNotebook();
        });
      }
      if (bbSaveBtn) {
        bbSaveBtn.addEventListener('click', (event) => {
          event.stopPropagation();
          saveBlackboardEdit();
        });
      }
      if (bbCancelBtn) {
        bbCancelBtn.addEventListener('click', (event) => {
          event.stopPropagation();
          cancelBlackboardEdit();
        });
      }
      if (bbAddExampleBtn) {
        bbAddExampleBtn.addEventListener('click', (event) => {
          event.stopPropagation();
          addBlackboardExampleItem();
        });
      }

      // Blackboard formatting toolbar (rich text)
      const formatToolbar = document.getElementById('bb-format-toolbar');
      const fontSizeSelect = document.getElementById('bb-font-size');
      const fontColorInput = document.getElementById('bb-font-color');
      if (formatToolbar) {
        formatToolbar.querySelectorAll('[data-bb-cmd]').forEach((btn) => {
          btn.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            const cmd = btn.dataset.bbCmd;
            if (!cmd) return;
            try { document.getElementById('blackboard-node-content')?.focus?.(); } catch (e) { /* ignore */ }
            try { document.execCommand(cmd, false, null); } catch (e) { /* ignore */ }
          });
        });
      }
      if (fontSizeSelect) {
        fontSizeSelect.addEventListener('change', (event) => {
          event.stopPropagation();
          try { document.getElementById('blackboard-node-content')?.focus?.(); } catch (e) { /* ignore */ }
          const val = (fontSizeSelect.value || '3').toString();
          try { document.execCommand('fontSize', false, val); } catch (e) { /* ignore */ }
        });
      }
      if (fontColorInput) {
        fontColorInput.addEventListener('change', (event) => {
          event.stopPropagation();
          try { document.getElementById('blackboard-node-content')?.focus?.(); } catch (e) { /* ignore */ }
          const val = (fontColorInput.value || '#e2e8f0').toString();
          try { document.execCommand('foreColor', false, val); } catch (e) { /* ignore */ }
        });
      }

      document.addEventListener('keydown', (event) => {
        if (!boardEditor.editing) return;
        const key = (event.key || '').toLowerCase();
        if ((event.ctrlKey || event.metaKey) && key === 's') {
          event.preventDefault();
          saveBlackboardEdit();
        } else if (event.key === 'Escape') {
          event.preventDefault();
          cancelBlackboardEdit();
        }
      });

      document.addEventListener('selectionchange', () => {
        updateSaveSelectionButtonState();
        updateSelectionToolbar();
      });

      if (addAttentionBtn) {
        addAttentionBtn.addEventListener('pointerdown', (event) => {
          event.preventDefault();
          event.stopPropagation();
        });
        addAttentionBtn.addEventListener('click', async (event) => {
          event.preventDefault();
          event.stopPropagation();
          const sel = getUnifiedSelection();
          const text = (sel?.text || '').toString().trim();
          if (!text) return;
          try {
            const updatedBoard = await updateAttentionScopeBySnippet(text, sel.origin === 'materials' ? 'materials' : 'blackboard');
            renderBoard(updatedBoard);
            await bindBoardContextToVoice();
            pushSessionMessage('system', voiceLang === 'en'
              ? 'Attention scope expanded. The teacher can now cite the newly selected passage.'
              : '已扩展讲师注意力范围：讲师下一轮可引用你刚新增的片段。');
            const nudge = voiceLang === 'en'
              ? 'The learner expanded the allowed sources. Continue teaching from the current node, and if relevant, cite the newly added passage.'
              : '学习者刚刚扩展了允许引用范围。请从当前节点继续讲解，如有需要可引用刚新增的片段。';
            await sendTextByPreferredTransport(nudge);
          } catch (e) {
            window.alert(e?.message || (voiceLang === 'en' ? 'Failed to expand attention scope.' : '扩展注意力范围失败。'));
          } finally {
            hideSelectionToolbar();
            try { window.getSelection()?.removeAllRanges?.(); } catch (e) { /* ignore */ }
          }
        });
      }

      if (saveNoteBtn) {
        saveNoteBtn.addEventListener('pointerdown', (event) => {
          event.preventDefault();
          event.stopPropagation();
        });
        saveNoteBtn.addEventListener('click', (event) => {
          event.preventDefault();
          event.stopPropagation();
          const sel = getUnifiedSelection();
          const text = (sel?.text || '').toString().trim();
          if (!text) return;
          const source = sel.origin === 'materials' ? 'materials' : 'content';
          const items = loadNotebookItems();
          const isDup = items.some(item => (item?.text || '').toString().trim() === text);
          if (isDup) {
            window.alert(voiceT('bb_save_selection_dup'));
            hideSelectionToolbar();
            return;
          }
          saveNotebookItems([buildNotebookItem(text, source), ...items]);
          renderNotesPreview();
          window.alert(voiceT('bb_save_selection_ok'));
          hideSelectionToolbar();
          try { window.getSelection()?.removeAllRanges?.(); } catch (e) { /* ignore */ }
        });
      }

      if (confirmYesBtn) confirmYesBtn.addEventListener('click', () => resolveConfirmGenerateDecision(true));
      if (confirmNoBtn) confirmNoBtn.addEventListener('click', () => resolveConfirmGenerateDecision(false));
      if (confirmCloseBtn) confirmCloseBtn.addEventListener('click', () => resolveConfirmGenerateDecision(false));

      document.addEventListener('pointerdown', (event) => {
        const toolbar = document.getElementById('selection-toolbar');
        if (!toolbar || toolbar.classList.contains('hidden')) return;
        const target = event.target;
        if (toolbar.contains(target)) return;
        const sel = window.getSelection();
        if (!sel || sel.isCollapsed) hideSelectionToolbar();
      });

      if (micBtn) {
        // 输入框麦克风：语音识别 -> 文本（用来快速说出学习目标/问题）
        micBtn.addEventListener('click', (event) => {
          event.stopPropagation();
          toggleVoiceFallback();
        });
      }

      if (voiceBtn) {
        // “实时语音聊天”：优先启用 OpenAI Realtime 真语音（麦克风流 + 音频delta播放）
        voiceBtn.addEventListener('click', async (event) => {
          event.stopPropagation();
          await loadBackendCaps();
          if (backendCaps.hasOpenAIKey) {
            try {
              if (realtimeVoice.recording) {
                await stopOpenAIRealtimeVoiceCall();
              } else {
                await startOpenAIRealtimeVoiceCall();
              }
            } catch (e) {
              console.error('OpenAI Realtime 语音启动失败:', e);
              window.alert(e?.message || (voiceLang === 'en' ? 'Failed to start OpenAI Realtime voice.' : '启动 OpenAI Realtime 真语音失败。'));
              try { await stopOpenAIRealtimeVoiceCall(); } catch (_) { /* ignore */ }
            }
            return;
          }
          // 没有 Realtime 时，回退语音识别->文本
          toggleVoiceFallback();
        });
      }

      if (endCallBtn) {
        endCallBtn.addEventListener('click', (event) => {
          event.preventDefault();
          if (realtimeVoice.recording) {
            try { forceStopOpenAIRealtimeVoiceCall(); } catch (e) { /* ignore */ }
          }
          persistSessionToRecords('end_call');
          window.location.href = 'ai语言学习平台-主页.html';
        });
      }

      window.addEventListener('beforeunload', () => {
        if (realtimeVoice.recording) {
          try { forceStopOpenAIRealtimeVoiceCall(); } catch (e) { /* ignore */ }
        }
        persistSessionToRecords('beforeunload');
      });

      loadBackendCaps();
    }

    (function initSessionReplay() {
      try {
        const params = new URLSearchParams(window.location.search);
        const sessionParam = params.get('session');
        if (!sessionParam) return;
        const archive = loadJsonStorage(SESSION_ARCHIVE_KEY, {});
        let session = archive && typeof archive === 'object'
          ? archive[sessionParam]
          : null;
        if (!session) {
          const raw = localStorage.getItem('linguify-last-session');
          if (raw) {
            const parsed = JSON.parse(raw);
            if (parsed && parsed.id === sessionParam) {
              session = parsed;
            }
          }
        }
        if (!session) return;
        sessionRuntime.replayLoaded = true;

        const wrapper = document.getElementById('main-wrapper');
        if (sessionParam && wrapper && !wrapper.classList.contains('is-split')) {
          toggleMode();
        }

        const restoredMessages = [];
        if (Array.isArray(session.messages)) {
          session.messages.forEach((msg) => {
            if (!msg || typeof msg !== 'object') return;
            const text = (msg.text || '').toString().trim();
            if (!text) return;
            restoredMessages.push({
              role: normalizeMessageRole(msg.role),
              text,
              ts: msg.ts || new Date().toISOString()
            });
          });
        }
        if (restoredMessages.length) {
          sessionRuntime.messages = restoredMessages.slice(-300);
          renderChatMessages();
        }

        if (session.board && typeof session.board === 'object') {
          renderBoard(session.board);
        }
        } catch (e) {
        // ignore parse errors
      }
    })();

    initBoardInteractions();
  </script>
</body>
</html>
