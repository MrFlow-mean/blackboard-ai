    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .font-display {
            font-family: 'Outfit', sans-serif;
        }
        .grid-pattern {
            background-image: radial-gradient(circle, #0ea5e9 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.05;
        }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .glass-header {
            background: rgba(248, 250, 252, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .nav-workshop-icon {
            filter: grayscale(1);
            opacity: 0.65;
            mix-blend-mode: multiply;
            transition: filter 0.2s ease, opacity 0.2s ease;
        }
        .nav-workshop-active .nav-workshop-icon {
            filter: none;
            opacity: 1;
            mix-blend-mode: normal;
        }
        .streak-glow {
            filter: drop-shadow(0 0 8px rgba(14, 165, 233, 0.4));
        }
        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .animate-ripple {
            animation: ripple 2s infinite ease-out;
        }


        .app-shell {
            position: relative;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 260px;
            padding: 28px 18px;
            background: rgba(255, 255, 255, 0.9);
            border-right: 1px solid rgba(226, 232, 240, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 20;
            overflow-y: auto;
            overscroll-behavior: contain;
            scrollbar-width: thin;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.45);
            border-radius: 999px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.7);
        }

        .sidebar-title {
            font-weight: 700;
            color: #0f172a;
            font-size: 14px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .sidebar-section {
            margin-bottom: 20px;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .sidebar-item {
            width: 100%;
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(248, 250, 252, 0.95);
            border: 1px solid rgba(226, 232, 240, 0.9);
            display: flex;
            align-items: center;
            gap: 10px;
            color: #1e293b;
            font-weight: 600;
            font-size: 13px;
            transition: transform 0.12s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            position: relative;
            cursor: pointer;
        }

        .sidebar-item + .sidebar-item {
            margin-top: 10px;
        }

        .sidebar-item:hover {
            background: #fff;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
        }

        .sidebar-item small {
            display: block;
            color: #94a3b8;
            font-weight: 500;
            font-size: 11px;
            margin-top: 2px;
        }

        .sidebar-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-add-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            background: #fff;
            color: #64748b;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.12s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .sidebar-add-btn:hover {
            background: #f8fafc;
            box-shadow: 0 8px 16px rgba(15, 23, 42, 0.08);
        }

        .sidebar-meta {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sidebar-menu-btn {
            width: 26px;
            height: 26px;
            border-radius: 8px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            background: #fff;
            color: #64748b;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease, background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .sidebar-item:hover .sidebar-menu-btn {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar-menu-btn:hover {
            background: #f8fafc;
            box-shadow: 0 8px 16px rgba(15, 23, 42, 0.08);
        }

        .sidebar-action-menu {
            position: fixed;
            min-width: 180px;
            background: #fff;
            border-radius: 14px;
            border: 1px solid rgba(226, 232, 240, 0.9);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.16);
            padding: 8px;
            display: none;
            z-index: 120;
        }

        .sidebar-action-menu.active {
            display: block;
        }

        .sidebar-menu-item {
            width: 100%;
            padding: 8px 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-weight: 600;
            color: #1f2937;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .sidebar-menu-item:hover {
            background: #f8fafc;
        }

        .sidebar-menu-item.danger {
            color: #ef4444;
        }

        .sidebar-chip {
            padding: 2px 6px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.12);
            color: #64748b;
            font-size: 10px;
            font-weight: 600;
        }

        .sidebar-assign-btn {
            padding: 4px 8px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            background: #fff;
            color: #475569;
            font-size: 11px;
            font-weight: 600;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.35);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .modal-backdrop.active {
            display: flex;
        }

        .modal-card {
            width: min(420px, 92vw);
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(226, 232, 240, 0.9);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 16px;
        }

        .modal-btn {
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
        }

        .modal-btn.cancel {
            background: #f1f5f9;
            color: #475569;
        }

        .modal-btn.primary {
            background: #0ea5e9;
            color: #fff;
        }

        .content-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            padding-bottom: 120px;
            position: relative;
        }

        @media (max-width: 1100px) {
            .sidebar {
                display: none;
            }
        }
    </style>

        const HOME_I18N = {
            'zh-CN': {
                title: '学习平台',
                streak_days_unit: '天',
                streak_label: '连续学习天数',
                month_label: '三月 2024',
                weekday_mon: '一',
                weekday_tue: '二',
                weekday_wed: '三',
                weekday_thu: '四',
                weekday_fri: '五',

                weekday_sun: '日',
                notebook_title: '重点笔记本',
                notebook_saved_prefix: '已收藏',
                notebook_saved_suffix: '个核心知识点',
                start_voice_button: '开始 AI 语音对话',
                training_tip: '正在与 AI 导师进行流利度训练 • 目前关卡: 旅游场景会话',
                nav_home: '首页',

                nav_my: '我的',
                sidebar_packs_title: '成套体系课',
                sidebar_lessons_title: '课程记录',
                add_pack_aria: '新建课程包',
                pack_modal_title: '新建课程包',
                pack_name_placeholder: '课程包名称',
                pack_desc_placeholder: '简介（可选）',
                pack_cancel: '取消',
                pack_create: '创建',
                move_modal_title: '移动到课程包',
                move_modal_close: '关闭',
                menu_share: '分享',
                menu_rename: '重命名',
                menu_pin: '置顶',
                menu_unpin: '取消置顶',
                menu_move: '移动到课程包',
                menu_delete: '删除',
                pack_fallback: '课程包',
                lessons_count: '{{count}} 课',
                move_empty: '暂无课程包，请先新建课程包。',
                move_action: '移动',
                share_copied: '分享内容已复制',
                share_prompt: '复制分享内容',
                rename_prompt: '重命名课程',
                delete_pack_confirm: '确定删除该课程包吗？',
                delete_lesson_confirm: '确定删除该课程吗？',
                more_actions_aria: '更多操作'
            },
            'en': {
                title: 'Learning Hub',
                streak_days_unit: 'DAYS',
                streak_label: 'Streak Days',
                month_label: 'March 2024',
                weekday_mon: 'Mon',
                weekday_tue: 'Tue',
                weekday_wed: 'Wed',
                weekday_thu: 'Thu',

                weekday_sat: 'Sat',
                weekday_sun: 'Sun',
                notebook_title: 'Pinned Notebook',
                notebook_saved_prefix: 'Saved',
                notebook_saved_suffix: 'key points',
                start_voice_button: 'Start AI Voice Chat',
                training_tip: 'Fluency training with AI tutor • Current stage: Travel dialogue',
                nav_home: 'Home',
                nav_rank: 'Course Workshop',
                nav_my: 'Me',
                sidebar_packs_title: 'Course Packs',
                sidebar_lessons_title: 'Lesson Records',
                add_pack_aria: 'Create course pack',
                pack_modal_title: 'New Course Pack',
                pack_name_placeholder: 'Course pack name',
                pack_desc_placeholder: 'Description (optional)',
                pack_cancel: 'Cancel',
                pack_create: 'Create',
                move_modal_title: 'Move to Pack',
                move_modal_close: 'Close',
                menu_share: 'Share',
                menu_rename: 'Rename',
                menu_pin: 'Pin',
                menu_unpin: 'Unpin',
                menu_move: 'Move to Pack',
                menu_delete: 'Delete',
                pack_fallback: 'Course Pack',
                lessons_count: '{{count}} lessons',
                move_empty: 'No course packs yet. Create one first.',
                move_action: 'Move',
                share_copied: 'Share text copied',
                share_prompt: 'Copy share text',
                rename_prompt: 'Rename course',
                delete_pack_confirm: 'Delete this course pack?',
                delete_lesson_confirm: 'Delete this lesson?',
                more_actions_aria: 'More actions'
            }
        };

        function getHomeLang() {
            return localStorage.getItem(HOME_LANG_KEY) || 'zh-CN';
        }

        function homeT(key, lang = getHomeLang()) {
            const dict = HOME_I18N[lang] || HOME_I18N['zh-CN'];
            return dict[key] || HOME_I18N['zh-CN'][key] || '';
        }

        function homeFormat(key, params = {}, lang = getHomeLang()) {
            let text = homeT(key, lang);
            Object.entries(params).forEach(([k, v]) => {
                text = text.replace(`{{${k}}}`, v);
            });
            return text;
        }

        // 主页：进入 AI 语音通话学习模式
        (function () {
            const startBtn = document.getElementById('start-learning-btn');
            if (!startBtn) return;

            startBtn.addEventListener('click', function () {
                window.location.href = 'AI语音通话学习模式.html';
            });
        })();

        // 侧边栏：课程包 & 单课记录
        (function () {
            const PACKS_KEY = 'linguify-course-packs';
            const LESSONS_KEY = 'linguify-lessons';
            const SESSION_ARCHIVE_KEY = 'linguify-session-archive';
            const lang = getHomeLang();
            let sessions = lang === 'en'
                ? {
                    'record-grammar': {
                        title: 'Grammar Fix · Tense Practice',
                        summary: 'Focus: simple past vs present perfect',
                        tags: ['Grammar: past tense', 'Fixes: verb tense'],
                        dialogue: ['I already went yesterday.', 'AI: You can say: I went yesterday.']
                    },
                    'record-pronounce': {
                        title: 'Pronunciation · Linking',
                        summary: 'Focus: linking and stress',
                        tags: ['Pronunciation: linking', 'Tips: stress'],
                        dialogue: ['Practice: could you', 'AI: Notice /kʊdʒə/ linking.']
                    }
                }
                : {
                    'record-grammar': {
                        title: '语法纠错 · 时态练习',
                        summary: '重点：一般过去时与现在完成时',
                        tags: ['语法：过去时', '纠错：动词时态'],
                        dialogue: ['我昨天已经去了。', 'AI：You can say: I went yesterday.']
                    },
                    'record-pronounce': {
                        title: '发音训练 · 连读',
                        summary: '重点：连读与重音',
                        tags: ['发音：连读', '技巧：重音'],
                        dialogue: ['练习: could you', 'AI：注意 /kʊdʒə/ 连读。']
                    }
                };

            const defaultPacks = lang === 'en'
                ? [
                    {
                        id: 'linguify-core',
                        title: 'AI Narration · Core Pack',
                        desc: 'Board notes + explanations + examples',
                        lessons: []
                    },
                    {
                        id: 'travel-pack',
                        title: 'Travel Scenarios · Pack',
                        desc: 'Vocabulary + dialogues',
                        lessons: []
                    }
                ]
                : [
                    {
                        id: 'linguify-core',
                        title: 'AI 讲述 · 系统课程包',
                        desc: '版书 + 讲解 + 例句',
                        lessons: []
                    },
                    {
                        id: 'travel-pack',
                        title: '旅行情景 · 大包',
                        desc: '场景词汇 + 对话',
                        lessons: []
                    }
                ];

            const defaultLessons = lang === 'en'
                ? [
                    { id: 'record-grammar', title: 'Grammar Fix · Single Lesson', desc: 'Dialogue replay', icon: 'lucide:file-text', color: 'text-purple-500', pinned: false },
                    { id: 'record-pronounce', title: 'Pronunciation Training · Single Lesson', desc: 'Corrections + examples', icon: 'lucide:mic-2', color: 'text-amber-500', pinned: false }
                ]
                : [
                    { id: 'record-grammar', title: '语法纠错 · 单课', desc: '对话回放', icon: 'lucide:file-text', color: 'text-purple-500', pinned: false },
                    { id: 'record-pronounce', title: '发音训练 · 单课', desc: '纠音 + 示例', icon: 'lucide:mic-2', color: 'text-amber-500', pinned: false }
                ];

            const PACK_I18N = {
                'linguify-core': {
                    'zh-CN': { title: 'AI 讲述 · 系统课程包', desc: '版书 + 讲解 + 例句' },
                    'en': { title: 'AI Narration · Core Pack', desc: 'Board notes + explanations + examples' }
                },
                'travel-pack': {
                    'zh-CN': { title: '旅行情景 · 大包', desc: '场景词汇 + 对话' },
                    'en': { title: 'Travel Scenarios · Pack', desc: 'Vocabulary + dialogues' }
                }
            };

            const LESSON_I18N = {
                'record-grammar': {
                    'zh-CN': { title: '语法纠错 · 单课', desc: '对话回放' },
                    'en': { title: 'Grammar Fix · Single Lesson', desc: 'Dialogue replay' }
                },
                'record-pronounce': {
                    'zh-CN': { title: '发音训练 · 单课', desc: '纠音 + 示例' },
                    'en': { title: 'Pronunciation Training · Single Lesson', desc: 'Corrections + examples' }
                }
            };

            const normalizeText = (value) => (value || '').toString().replace(/\u00a0/g, ' ').replace(/\s+/g, ' ').trim();
            const containsChinese = (value) => /[\u4E00-\u9FFF]/.test(value || '');
            const getLocalized = (map) => (map && (map[lang] || map['zh-CN'])) || null;
            const matchesDefault = (value, map, field) => {
                const normalized = normalizeText(value);
                if (!normalized) return true;
                const zh = normalizeText(map?.['zh-CN']?.[field]);
                const en = normalizeText(map?.['en']?.[field]);
                return normalized === zh || normalized === en;
            };
            const truncateTitle = (value, maxLen) => {
                const safe = normalizeText(value);
                if (!safe) return '';
                if (safe.length <= maxLen) return safe;
                return `${safe.slice(0, maxLen).replace(/[，。！？,.\s·]+$/g, '')}…`;
            };
            const extractGoalLine = (value) => {
                const raw = (value || '').toString().trim();
                if (!raw) return '';
                const lines = raw.split('\n').map(line => line.trim()).filter(Boolean);
                let base = lines.find(line => /学习目标[:：]|goal[:：]/i.test(line)) || lines[0] || raw;
                base = base.replace(/^学习目标[:：]\s*/i, '').replace(/^Goal[:：]\s*/i, '').trim();
                base = base.replace(/当前水平[:：].*$/i, '').replace(/补充信息[:：].*$/i, '').trim();
                return base;
            };
            const summarizeLessonTitle = (rawTitle) => {
                const original = normalizeText(rawTitle);
                if (!original) return '';
                const maxLen = lang === 'en' ? 56 : 22;
                if (original.length <= maxLen) return original;

                const base = extractGoalLine(rawTitle);
                const langMatch = base.match(/(英语|日语|法语|德语|西班牙语|韩语|中文|俄语|English|Japanese|French|German|Spanish|Korean|Chinese|Russian)/i);
                const levelMatch = base.match(/\b(A1|A2|B1|B2|C1|C2)\b/i);
                const grammarMatch = base.match(/(过去将来时|过去完成时|过去完成进行时|现在完成时|条件句|虚拟式|被动语态|从句|时态|subjunctive|conditional|conditionals|passive voice|tense)/i);
                let scenario = '';
                const scenarioPatterns = [
                    /在(.+?)(?:的)?场景(对话|会话|练习|交流)/,
                    /(.+?)情景对话/,
                    /(.+?)场景对话/,
                    /(.+?)对话/,
                    /(.+?)会话/,
                    /(.+?)dialogue/i,
                    /(.+?)conversation/i,
                    /(.+?)scenario/i
                ];
                for (const pattern of scenarioPatterns) {
                    const match = base.match(pattern);
                    if (match && match[1]) {
                        scenario = match[1].trim();
                        if (match[2]) scenario = `${scenario}${match[2]}`;
                        break;
                    }
                }

                const parts = [];
                if (langMatch && levelMatch) {
                    parts.push(`${langMatch[1]}${levelMatch[1].toUpperCase()}`);
                } else if (langMatch) {
                    parts.push(langMatch[1]);
                } else if (levelMatch) {
                    parts.push(levelMatch[1].toUpperCase());
                }
                if (scenario) parts.push(scenario);
                if (grammarMatch) parts.push(grammarMatch[1]);

                let title = normalizeText(parts.join(' · ')) || base || original;
                title = title
                    .replace(/(我的|我要|我想|请|帮我|生成|写|一篇|一段|一份|一个|给我)/g, '')
                    .replace(/\s+/g, ' ')
                    .trim();

                return truncateTitle(title, maxLen);
            };

            const getPackDisplay = (pack) => {
                const map = PACK_I18N[pack.id];
                if (!map) return { title: pack.title, desc: pack.desc };
                const localized = getLocalized(map);
                const forceTitle = lang === 'en' && containsChinese(pack.title);
                const forceDesc = lang === 'en' && containsChinese(pack.desc);
                return {
                    title: (forceTitle || matchesDefault(pack.title, map, 'title')) ? localized.title : pack.title,
                    desc: (forceDesc || matchesDefault(pack.desc, map, 'desc')) ? localized.desc : pack.desc
                };
            };

            const getLessonDisplay = (lesson) => {
                const map = LESSON_I18N[lesson.id];
                if (!map) {
                    return { title: summarizeLessonTitle(lesson.title), desc: lesson.desc };
                }
                const localized = getLocalized(map);
                const forceTitle = lang === 'en' && containsChinese(lesson.title);
                const forceDesc = lang === 'en' && containsChinese(lesson.desc);
                const rawTitle = (forceTitle || matchesDefault(lesson.title, map, 'title')) ? localized.title : lesson.title;
                return {
                    title: summarizeLessonTitle(rawTitle),
                    desc: (forceDesc || matchesDefault(lesson.desc, map, 'desc')) ? localized.desc : lesson.desc
                };
            };

            const mergeSessionArchiveIntoSessions = (archive) => {
                Object.entries(archive || {}).forEach(([id, session]) => {
                    if (!session || typeof session !== 'object') return;
                    sessions[id] = {
                        id,
                        title: session.title || '',
                        summary: session.summary || '',
                        tags: Array.isArray(session.tags) ? session.tags : [],
                        dialogue: Array.isArray(session.dialogue) ? session.dialogue : [],
                        board: session.board || null,
                        messages: Array.isArray(session.messages) ? session.messages : [],
                        board_changes: Array.isArray(session.board_changes) ? session.board_changes : [],
                        started_at: session.started_at || null,
                        ended_at: session.ended_at || null
                    };
                });
            };

            const packList = document.getElementById('course-pack-list');
            const lessonList = document.getElementById('course-lesson-list');
            const addPackBtn = document.getElementById('add-pack-btn');
            const packModal = document.getElementById('pack-modal');
            const packNameInput = document.getElementById('pack-name-input');
            const packDescInput = document.getElementById('pack-desc-input');
            const packCreateBtn = document.getElementById('pack-create-btn');
            const packCancelBtn = document.getElementById('pack-cancel-btn');
            const moveModal = document.getElementById('move-modal');
            const moveModalList = document.getElementById('move-modal-list');
            const moveModalClose = document.getElementById('move-modal-close');
            const actionMenu = document.getElementById('sidebar-action-menu');
            let packs = [];
            let lessons = [];

            const loadPacks = () => {
                try {
                    const raw = localStorage.getItem(PACKS_KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        if (Array.isArray(parsed)) return parsed;
                    }
                } catch (e) {
                    // ignore
                }
                return defaultPacks;
            };

            const savePacks = (packs) => {
                localStorage.setItem(PACKS_KEY, JSON.stringify(packs));
            };

            const loadLessons = () => {
                try {
                    const raw = localStorage.getItem(LESSONS_KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        if (Array.isArray(parsed)) return parsed;
                    }
                } catch (e) {
                    // ignore
                }
                return defaultLessons;
            };

            const loadSessionArchive = () => {
                try {
                    const raw = localStorage.getItem(SESSION_ARCHIVE_KEY);
                    if (!raw) return {};
                    const parsed = JSON.parse(raw);
                    if (parsed && typeof parsed === 'object') return parsed;
                } catch (e) {
                    // ignore
                }
                return {};
            };

            const saveLessons = (nextLessons) => {
                localStorage.setItem(LESSONS_KEY, JSON.stringify(nextLessons));
            };

            const saveSessionArchive = (archive) => {
                localStorage.setItem(SESSION_ARCHIVE_KEY, JSON.stringify(archive));
            };

            const mergeSessionArchiveIntoLessons = (baseLessons, archive) => {
                const merged = Array.isArray(baseLessons) ? [...baseLessons] : [];
                Object.entries(archive || {}).forEach(([id, session]) => {
                    if (merged.some(item => item.id === id)) return;
                    merged.unshift({
                        id,
                        title: session?.title || (lang === 'en' ? 'Saved lesson' : '课堂记录'),
                        desc: session?.summary || (lang === 'en' ? 'Saved class replay' : '已保存课堂回放'),
                        icon: 'lucide:history',
                        color: 'text-cyan-500',
                        pinned: false,
                        createdAt: session?.ended_at || session?.started_at || new Date().toISOString()
                    });
                });
                return merged;
            };

            const dedupeLessonsById = (items) => {
                const seen = new Set();
                return (Array.isArray(items) ? items : []).filter(item => {
                    if (!item || !item.id) return false;
                    if (seen.has(item.id)) return false;
                    seen.add(item.id);
                    return true;
                });
            };

            const renderPacks = (packs) => {
                if (!packList) return;
                packList.innerHTML = '';
                const sorted = [...packs].sort((a, b) => (b.pinned === true) - (a.pinned === true));
                sorted.forEach(pack => {
                    const display = getPackDisplay(pack);
                    const item = document.createElement('div');
                    item.className = 'sidebar-item';
                    item.dataset.href = `成套课程页面.html?course=${encodeURIComponent(pack.id)}`;
                    item.dataset.itemId = pack.id;
                    item.dataset.itemType = 'pack';
                    const count = Array.isArray(pack.lessons) ? pack.lessons.length : 0;
                    item.innerHTML = `
                        <iconify-icon icon="lucide:folder" class="text-sky-500 text-lg"></iconify-icon>
                        <div>
                            ${display.title || pack.title}
                            <small>${display.desc || pack.desc || homeT('pack_fallback', lang)}</small>
                        </div>
                        <div class="sidebar-meta">
                            <span class="sidebar-chip">${homeFormat('lessons_count', { count }, lang)}</span>
                            <button class="sidebar-menu-btn" type="button" aria-label="${homeT('more_actions_aria', lang)}">
                                <iconify-icon icon="lucide:more-horizontal"></iconify-icon>
                            </button>
                        </div>
                    `;
                    packList.appendChild(item);
                });
            };

            const renderLessons = (packs, lessons) => {
                if (!lessonList) return;
                lessonList.innerHTML = '';
                const visibleLessons = lessons.filter(lesson => !lesson.packId);
                const sorted = [...visibleLessons].sort((a, b) => {
                    const pinDiff = (b.pinned === true) - (a.pinned === true);
                    if (pinDiff !== 0) return pinDiff;
                    const aTime = Date.parse(a.createdAt || '') || 0;
                    const bTime = Date.parse(b.createdAt || '') || 0;
                    return bTime - aTime;
                });
                sorted.forEach(lesson => {
                    const display = getLessonDisplay(lesson);
                    const item = document.createElement('div');
                    item.className = 'sidebar-item';
                    item.dataset.lessonId = lesson.id;
                    item.dataset.itemId = lesson.id;
                    item.dataset.itemType = 'lesson';
                    item.innerHTML = `
                        <iconify-icon icon="${lesson.icon}" class="${lesson.color} text-lg"></iconify-icon>
                        <div>
                            ${display.title || lesson.title}
                            <small>${display.desc || lesson.desc}</small>
                        </div>
                        <div class="sidebar-meta">
                            <button class="sidebar-menu-btn" type="button" aria-label="${homeT('more_actions_aria', lang)}">
                                <iconify-icon icon="lucide:more-horizontal"></iconify-icon>
                            </button>
                        </div>
                    `;
                    lessonList.appendChild(item);
                });
            };

            const openPackModal = (prefillName = '') => {
                if (!packModal) return;
                packModal.classList.add('active');
                if (packNameInput) packNameInput.value = prefillName || '';
                if (packDescInput) packDescInput.value = '';
                if (packNameInput) packNameInput.focus();
            };

            const closePackModal = () => {
                if (!packModal) return;
                packModal.classList.remove('active');
            };

            const closeMoveModal = () => {
                if (!moveModal) return;
                moveModal.classList.remove('active');
            };

            const openMoveModal = (lesson) => {
                if (!moveModal || !moveModalList) return;
                moveModalList.innerHTML = '';
                if (!packs.length) {
                    moveModalList.innerHTML = `<div class="text-xs text-slate-400">${homeT('move_empty', lang)}</div>`;
                    moveModal.classList.add('active');
                    return;
                }
                packs.forEach(pack => {
                    const display = getPackDisplay(pack);
                    const row = document.createElement('button');
                    row.className = 'w-full flex items-center justify-between rounded-xl border border-slate-200 px-4 py-3 text-left hover:border-sky-300 transition-colors';
                    row.innerHTML = `
                        <div>
                            <div class="text-sm font-semibold text-slate-800">${display.title || pack.title}</div>
                            <div class="text-xs text-slate-500">${display.desc || pack.desc || homeT('pack_fallback', lang)}</div>
                        </div>
                        <span class="text-xs text-sky-600 font-semibold">${homeT('move_action', lang)}</span>
                    `;
                    row.addEventListener('click', () => {
                        if (!Array.isArray(pack.lessons)) pack.lessons = [];
                        if (!pack.lessons.includes(lesson.id)) {
                            pack.lessons.push(lesson.id);
                        }
                        lesson.packId = pack.id;
                        savePacks(packs);
                        saveLessons(lessons);
                        renderPacks(packs);
                        renderLessons(packs, lessons);
                        closeMoveModal();
                    });
                    moveModalList.appendChild(row);
                });
                moveModal.classList.add('active');
            };

            const closeActionMenu = () => {
                if (!actionMenu) return;
                actionMenu.classList.remove('active');
                actionMenu.dataset.itemId = '';
                actionMenu.dataset.itemType = '';
            };

            const openActionMenu = (trigger, type, id) => {
                if (!actionMenu) return;
                const moveItem = actionMenu.querySelector('[data-action="move"]');
                const pinItem = actionMenu.querySelector('[data-action="pin"] span');
                if (moveItem) {
                    moveItem.style.display = type === 'lesson' ? 'flex' : 'none';
                }
                if (pinItem) {
                    const current = type === 'pack'
                        ? packs.find(p => p.id === id)
                        : lessons.find(l => l.id === id);
                    pinItem.textContent = current?.pinned ? homeT('menu_unpin', lang) : homeT('menu_pin', lang);
                }
                actionMenu.dataset.itemId = id;
                actionMenu.dataset.itemType = type;
                actionMenu.classList.add('active');
                const rect = trigger.getBoundingClientRect();
                actionMenu.style.top = `${rect.bottom + 8}px`;
                const menuWidth = actionMenu.offsetWidth;
                const left = Math.min(rect.left, window.innerWidth - menuWidth - 12);
                actionMenu.style.left = `${Math.max(left, 12)}px`;
            };

            const maybeOpenPackModal = () => {
                const params = new URLSearchParams(window.location.search);
                if (params.get('openPack') !== '1') return;
                const packName = (params.get('packName') || '').trim();
                openPackModal(packName);
                params.delete('openPack');
                params.delete('packName');
                const baseUrl = window.location.href.split('?')[0].split('#')[0];
                const rest = params.toString();
                const nextUrl = rest ? `${baseUrl}?${rest}` : baseUrl;
                history.replaceState({}, '', nextUrl);
            };

            const init = () => {
                packs = loadPacks();
                const archive = loadSessionArchive();
                mergeSessionArchiveIntoSessions(archive);
                lessons = dedupeLessonsById(mergeSessionArchiveIntoLessons(loadLessons(), archive));
                saveLessons(lessons);
                renderPacks(packs);
                renderLessons(packs, lessons);

                if (addPackBtn) {
                    addPackBtn.addEventListener('click', openPackModal);
                }

                if (packCancelBtn) {
                    packCancelBtn.addEventListener('click', closePackModal);
                }

                if (packCreateBtn) {
                    packCreateBtn.addEventListener('click', () => {
                        const name = packNameInput.value.trim();
                        if (!name) return;
                        const desc = packDescInput.value.trim();
                        const newPack = {
                            id: `pack-${Date.now()}`,
                            title: name,
                            desc: desc || homeT('pack_fallback', lang),
                            lessons: []
                        };
                        packs = [...packs, newPack];
                        savePacks(packs);
                        renderPacks(packs);
                        closePackModal();
                    });
                }

                if (moveModalClose) {
                    moveModalClose.addEventListener('click', closeMoveModal);
                }

                if (packList) {
                    packList.addEventListener('click', (event) => {
                        const menuBtn = event.target.closest('.sidebar-menu-btn');
                        if (menuBtn) {
                            event.preventDefault();
                            event.stopPropagation();
                            const item = menuBtn.closest('.sidebar-item');
                            if (!item) return;
                            openActionMenu(menuBtn, item.dataset.itemType, item.dataset.itemId);
                            return;
                        }
                        const item = event.target.closest('.sidebar-item');
                        if (!item) return;
                        const href = item.dataset.href;
                        if (href) {
                            window.location.href = href;
                        }
                    });
                }

                if (lessonList) {
                    lessonList.addEventListener('click', (event) => {
                        const menuBtn = event.target.closest('.sidebar-menu-btn');
                        if (menuBtn) {
                            event.preventDefault();
                            event.stopPropagation();
                            const item = menuBtn.closest('.sidebar-item');
                            if (!item) return;
                            openActionMenu(menuBtn, item.dataset.itemType, item.dataset.itemId);
                            return;
                        }
                        const item = event.target.closest('[data-lesson-id]');
                        if (!item) return;
                        const id = item.dataset.lessonId;
                        const archive = loadSessionArchive();
                        const session = sessions[id] || archive[id];
                        if (session) {
                            localStorage.setItem('linguify-last-session', JSON.stringify({ ...session, id }));
                        }
                        window.location.href = 'AI语音通话学习模式.html?session=' + encodeURIComponent(id);
                    });
                }

                if (actionMenu) {
                    actionMenu.addEventListener('click', (event) => {
                        const actionBtn = event.target.closest('[data-action]');
                        if (!actionBtn) return;
                        const action = actionBtn.dataset.action;
                        const type = actionMenu.dataset.itemType;
                        const id = actionMenu.dataset.itemId;
                        const current = type === 'pack'
                            ? packs.find(p => p.id === id)
                            : lessons.find(l => l.id === id);
                        if (!current) return;
                        const display = type === 'pack' ? getPackDisplay(current) : getLessonDisplay(current);

                        if (action === 'share') {
                            const shareTitle = display.title || current.title;
                            const shareDesc = display.desc || current.desc;
                            const shareText = `${shareTitle}${shareDesc ? ' - ' + shareDesc : ''}`;
                            if (navigator.clipboard && navigator.clipboard.writeText) {
                                navigator.clipboard.writeText(shareText).then(() => {
                                    alert(homeT('share_copied', lang));
                                }).catch(() => {
                                    prompt(homeT('share_prompt', lang), shareText);
                                });
                            } else {
                                prompt(homeT('share_prompt', lang), shareText);
                            }
                        }

                        if (action === 'rename') {
                            const nextName = prompt(homeT('rename_prompt', lang), display.title || current.title || '');
                            if (nextName && nextName.trim()) {
                                current.title = nextName.trim();
                                savePacks(packs);
                                saveLessons(lessons);
                                renderPacks(packs);
                                renderLessons(packs, lessons);
                            }
                        }

                        if (action === 'pin') {
                            current.pinned = !current.pinned;
                            savePacks(packs);
                            saveLessons(lessons);
                            renderPacks(packs);
                            renderLessons(packs, lessons);
                        }

                        if (action === 'move' && type === 'lesson') {
                            openMoveModal(current);
                        }

                        if (action === 'delete') {
                            const confirmText = type === 'pack'
                                ? homeT('delete_pack_confirm', lang)
                                : homeT('delete_lesson_confirm', lang);
                            if (!confirm(confirmText)) return;
                            if (type === 'pack') {
                                packs = packs.filter(p => p.id !== id);
                                lessons.forEach(lesson => {
                                    if (lesson.packId === id) {
                                        delete lesson.packId;
                                    }
                                });
                            } else {
                                lessons = lessons.filter(l => l.id !== id);
                                packs.forEach(pack => {
                                    if (Array.isArray(pack.lessons)) {
                                        pack.lessons = pack.lessons.filter(lessonId => lessonId !== id);
                                    }
                                });
                                const archive = loadSessionArchive();
                                if (archive[id]) {
                                    delete archive[id];
                                    saveSessionArchive(archive);
                                }
                                if (sessions[id] && id.startsWith('record-') && !SESSION_I18N[id]) {
                                    delete sessions[id];
                                }
                            }
                            savePacks(packs);
                            saveLessons(lessons);
                            renderPacks(packs);
                            renderLessons(packs, lessons);
                        }

                        closeActionMenu();
                    });
                }

                document.addEventListener('click', (event) => {
                    if (!actionMenu || !actionMenu.classList.contains('active')) return;
                    if (event.target.closest('#sidebar-action-menu')) return;
                    if (event.target.closest('.sidebar-menu-btn')) return;
                    closeActionMenu();
                });

                window.addEventListener('resize', closeActionMenu);
                window.addEventListener('scroll', closeActionMenu, true);

                maybeOpenPackModal();
            };

            init();
        })();

        // 主页："我的"按钮 - 跳转到"我的设置"页面
        (function () {
            const myProfileBtn = document.getElementById('my-profile-btn');
            if (!myProfileBtn) return;

            myProfileBtn.addEventListener('click', function () {
                // 跳转到"我的设置"页面
                window.location.href = '我的设置页面.html';
            });
        })();

        // 多语言显示（跟随设置页的语言选择）
        (function () {
            const lang = getHomeLang();

            function applyTranslations() {
                document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.dataset.i18n;
                    el.textContent = homeT(key, lang);
                });
                document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                    const key = el.dataset.i18nPlaceholder;
                    el.setAttribute('placeholder', homeT(key, lang));
                });
                document.querySelectorAll('[data-i18n-aria]').forEach(el => {
                    const key = el.dataset.i18nAria;
                    el.setAttribute('aria-label', homeT(key, lang));
                });
                document.querySelectorAll('[data-i18n-title]').forEach(el => {
                    const key = el.dataset.i18nTitle;
                    el.setAttribute('title', homeT(key, lang));
                });
                document.title = `Linguify - ${homeT('title', lang)}`;
            }

            applyTranslations();
        })();
    </script>
</body>
</html>
