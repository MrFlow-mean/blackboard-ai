<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>成套课程 - Linguify</title>
  <!-- EN: zh-CN UI strings on this page have English equivalents in the embedded i18n dictionary (look for the 'en' section). -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .font-display { font-family: 'Outfit', sans-serif; }
    .card { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(226, 232, 240, 0.9); }
    .add-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: #fff;
      color: #64748b;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    .modal-backdrop.active { display: flex; }
    .modal-card {
      width: min(420px, 92vw);
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(226, 232, 240, 0.9);
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15);
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }
    .modal-btn {
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .modal-btn.cancel { background: #f1f5f9; color: #475569; }
    .modal-btn.primary { background: #0ea5e9; color: #fff; }
  </style>
</head>
<body class="min-h-screen bg-slate-50">
  <header class="bg-white border-b border-slate-200 px-6 py-4">
    <div class="flex items-center gap-4">
      <a href="ai语言学习平台-主页.html" class="inline-flex items-center justify-center h-10 w-10 rounded-full hover:bg-slate-100 transition-colors">
        <iconify-icon icon="lucide:chevron-left" class="text-xl text-slate-700"></iconify-icon>
      </a>
      <div>
        <h1 id="course-title" class="text-xl font-bold text-slate-800 font-display" data-i18n="course_pack_title">成套课程</h1>
        <p id="course-subtitle" class="text-xs text-slate-400" data-i18n="course_pack_subtitle">系统化学习路径</p>
      </div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-8">
    <section class="card rounded-2xl p-6 shadow-sm">
      <div class="flex items-center justify-between gap-3 mb-4">
        <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-emerald-100 flex items-center justify-center text-emerald-600">
          <iconify-icon icon="lucide:list-checks" class="text-xl"></iconify-icon>
        </div>
          <h2 class="text-lg font-bold text-slate-800 font-display" data-i18n="course_sections_title">课程章节</h2>
        </div>
        <button id="add-lesson-btn" class="add-btn" aria-label="加入单课" data-i18n-aria="add_single_lesson_aria">
          <iconify-icon icon="lucide:plus" class="text-lg"></iconify-icon>
        </button>
      </div>
      <div id="course-modules" class="space-y-3"></div>
    </section>
  </main>

  <div id="lesson-modal" class="modal-backdrop" aria-hidden="true">
    <div class="modal-card">
      <h3 class="text-sm font-bold text-slate-800 mb-3" data-i18n="modal_add_lesson">加入单课</h3>
      <div id="lesson-modal-list" class="space-y-2"></div>
      <div class="modal-actions">
        <button id="lesson-modal-close" class="modal-btn cancel" data-i18n="modal_close">关闭</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const PACKS_KEY = 'linguify-course-packs';
      const LESSONS_KEY = 'linguify-lessons';
      const LANG_STORAGE_KEY = 'ui-language';
      const lang = localStorage.getItem(LANG_STORAGE_KEY) || 'zh-CN';
      const UI_I18N = {
        'zh-CN': {
          page_title: '成套课程 - Linguify',
          course_pack_title: '成套课程',
          course_pack_subtitle: '系统化学习路径',
          course_sections_title: '课程章节',
          add_single_lesson_aria: '加入单课',
          modal_add_lesson: '加入单课',
          modal_close: '关闭',
          empty_modules: '暂无课程，请点击右上角 + 添加单课。',
          enter_class: '进入课堂',
          join_btn: '加入'
        },
        'en': {
          page_title: 'Course Pack - Linguify',
          course_pack_title: 'Course Pack',
          course_pack_subtitle: 'A structured learning path',
          course_sections_title: 'Course Modules',
          add_single_lesson_aria: 'Add lesson',
          modal_add_lesson: 'Add Lesson',
          modal_close: 'Close',
          empty_modules: 'No lessons yet. Click the + button to add one.',
          enter_class: 'Enter Class',
          join_btn: 'Add'
        }
      };

      const t = (key) => {
        const dict = UI_I18N[lang] || UI_I18N['zh-CN'];
        return dict[key] || UI_I18N['zh-CN'][key] || '';
      };

      const LESSON_I18N = {
        'record-grammar': {
          'zh-CN': { title: '语法纠错 · 单课', desc: '对话回放' },
          'en': { title: 'Grammar Fix · Single Lesson', desc: 'Dialogue replay' }
        },
        'record-pronounce': {
          'zh-CN': { title: '发音训练 · 单课', desc: '纠音 + 示例' },
          'en': { title: 'Pronunciation Training · Single Lesson', desc: 'Corrections + examples' }
        }
      };

      const SESSION_PRESETS = {
        'record-grammar': {
          'zh-CN': {
            title: '语法纠错 · 时态练习',
            summary: '重点：一般过去时与现在完成时',
            tags: ['语法：过去时', '纠错：动词时态'],
            dialogue: ['我昨天已经去了。', 'AI：You can say: I went yesterday.']
          },
          'en': {
            title: 'Grammar Fix · Tense Practice',
            summary: 'Focus: simple past vs present perfect',
            tags: ['Grammar: past tense', 'Fixes: verb tense'],
            dialogue: ['I already went yesterday.', 'AI: You can say: I went yesterday.']
          }
        },
        'record-pronounce': {
          'zh-CN': {
            title: '发音训练 · 连读',
            summary: '重点：连读与重音',
            tags: ['发音：连读', '技巧：重音'],
            dialogue: ['练习: could you', 'AI：注意 /kʊdʒə/ 连读。']
          },
          'en': {
            title: 'Pronunciation · Linking',
            summary: 'Focus: linking and stress',
            tags: ['Pronunciation: linking', 'Tips: stress'],
            dialogue: ['Practice: could you', 'AI: Notice /kʊdʒə/ linking.']
          }
        }
      };

      const getLessonDisplay = (lesson) => {
        const map = LESSON_I18N[lesson.id];
        if (!map) return lesson;
        const localized = map[lang] || map['zh-CN'];
        const zh = map['zh-CN'];
        const en = map['en'];
        const title = (lesson.title === zh.title || lesson.title === en.title || !lesson.title)
          ? localized.title
          : lesson.title;
        const desc = (lesson.desc === zh.desc || lesson.desc === en.desc || !lesson.desc)
          ? localized.desc
          : lesson.desc;
        return { ...lesson, title, desc };
      };

      const applyTranslations = () => {
        document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.dataset.i18n;
          el.textContent = t(key);
        });
        document.querySelectorAll('[data-i18n-aria]').forEach(el => {
          const key = el.dataset.i18nAria;
          el.setAttribute('aria-label', t(key));
        });
        document.title = t('page_title');
      };
      const courseMap = {
        'linguify-core': {
          'zh-CN': {
            title: 'AI 讲述 · 系统课程包',
            subtitle: '版书 + 讲解 + 例句',
            desc: '覆盖核心表达、语法纠错与常用场景，适合系统化学习。'
          },
          'en': {
            title: 'AI Narration · Core Pack',
            subtitle: 'Board notes + explanations + examples',
            desc: 'Covers core expressions, grammar fixes, and common scenarios for structured learning.'
          }
        },
        'travel-pack': {
          'zh-CN': {
            title: '旅行情景 · 大包',
            subtitle: '场景词汇 + 对话',
            desc: '包含机场、酒店、问路等高频场景课堂与回放。'
          },
          'en': {
            title: 'Travel Scenarios · Pack',
            subtitle: 'Vocabulary + dialogues',
            desc: 'Includes airport, hotel, and directions lessons with replays.'
          }
        }
      };

      const params = new URLSearchParams(window.location.search);
      const key = params.get('course');
      const data = courseMap[key]?.[lang] || courseMap[key]?.['zh-CN'];
      const modules = document.getElementById('course-modules');
      const addLessonBtn = document.getElementById('add-lesson-btn');
      const modal = document.getElementById('lesson-modal');
      const modalList = document.getElementById('lesson-modal-list');
      const modalClose = document.getElementById('lesson-modal-close');

      const loadPacks = () => {
        try {
          const raw = localStorage.getItem(PACKS_KEY);
          if (raw) return JSON.parse(raw);
        } catch (e) {}
        return [];
      };

      const savePacks = (packs) => {
        localStorage.setItem(PACKS_KEY, JSON.stringify(packs));
      };

      const loadLessons = () => {
        try {
          const raw = localStorage.getItem(LESSONS_KEY);
          if (raw) return JSON.parse(raw);
        } catch (e) {}
        return [];
      };

      const renderModules = (pack, lessons) => {
        if (!modules) return;
        modules.innerHTML = '';
        const list = Array.isArray(pack?.lessons) ? pack.lessons : [];
        if (!list.length) {
          modules.innerHTML = `<div class="text-sm text-slate-400">${t('empty_modules')}</div>`;
          return;
        }
        list.forEach(id => {
          const lessonRaw = lessons.find(l => l.id === id);
          if (!lessonRaw) return;
          const lesson = getLessonDisplay(lessonRaw);
          if (!lesson) return;
          const row = document.createElement('div');
          row.className = 'flex items-center justify-between rounded-xl border border-slate-200 px-4 py-3';
          row.innerHTML = `
            <div>
              <div class="text-sm font-semibold text-slate-800">${lesson.title}</div>
              <div class="text-xs text-slate-500">${lesson.desc}</div>
            </div>
            <button type="button" class="enter-class-btn text-xs font-semibold text-sky-600" data-lesson-id="${lesson.id}">${t('enter_class')}</button>
          `;
          modules.appendChild(row);
        });
      };

      const buildSessionFromLesson = (lesson, courseData) => {
        const preset = SESSION_PRESETS[lesson.id]?.[lang] || SESSION_PRESETS[lesson.id]?.['zh-CN'];
        if (preset) {
          return { ...preset, id: lesson.id };
        }
        const fallbackTag = (courseData?.subtitle || (lang === 'en' ? 'Course Module' : '课程模块')).trim();
        return {
          id: lesson.id,
          title: lesson.title,
          summary: lesson.desc || (lang === 'en' ? 'Lesson guidance' : '课程导学'),
          tags: fallbackTag ? [fallbackTag] : [],
          dialogue: lang === 'en'
            ? [`Lesson focus: ${lesson.title}`, 'AI: We will start with key concepts and guided practice.']
            : [`课程主题：${lesson.title}`, 'AI：我们先讲核心概念，再做引导练习。']
        };
      };

      const openModal = (pack, lessons, packs) => {
        if (!modal || !modalList) return;
        modalList.innerHTML = '';
        lessons.forEach(lessonRaw => {
          const lesson = getLessonDisplay(lessonRaw);
          const row = document.createElement('button');
          row.className = 'w-full flex items-center justify-between rounded-xl border border-slate-200 px-4 py-3 text-left';
          row.innerHTML = `
            <div>
              <div class="text-sm font-semibold text-slate-800">${lesson.title}</div>
              <div class="text-xs text-slate-500">${lesson.desc}</div>
            </div>
            <span class="text-xs text-sky-600 font-semibold">${t('join_btn')}</span>
          `;
          row.addEventListener('click', () => {
            if (!Array.isArray(pack.lessons)) pack.lessons = [];
            if (!pack.lessons.includes(lesson.id)) {
              pack.lessons.push(lesson.id);
              savePacks(packs);
              renderModules(pack, lessons);
            }
            modal.classList.remove('active');
          });
          modalList.appendChild(row);
        });
        modal.classList.add('active');
      };

      applyTranslations();

      if (data) {
        const title = document.getElementById('course-title');
        const subtitle = document.getElementById('course-subtitle');
        const desc = document.getElementById('course-desc');
        if (title) title.textContent = data.title;
        if (subtitle) subtitle.textContent = data.subtitle;
        if (desc) desc.textContent = data.desc;
      }

      const packs = loadPacks();
      const lessons = loadLessons();
      const currentPack = packs.find(p => p.id === key) || { id: key, lessons: [] };
      renderModules(currentPack, lessons);

      if (modules) {
        modules.addEventListener('click', (event) => {
          const enterBtn = event.target.closest('.enter-class-btn');
          if (!enterBtn) return;
          const lessonId = enterBtn.dataset.lessonId;
          if (!lessonId) return;
          const lessonRaw = lessons.find(item => item.id === lessonId);
          if (!lessonRaw) return;
          const lesson = getLessonDisplay(lessonRaw);
          const session = buildSessionFromLesson(lesson, data);
          try {
            localStorage.setItem('linguify-last-session', JSON.stringify(session));
          } catch (e) {
            // ignore storage errors
          }
          window.location.href = 'AI语音通话学习模式.html?session=' + encodeURIComponent(lessonId);
        });
      }

      if (addLessonBtn) {
        addLessonBtn.addEventListener('click', () => openModal(currentPack, lessons, packs));
      }

      if (modalClose) {
        modalClose.addEventListener('click', () => modal.classList.remove('active'));
      }
    })();
  </script>
</body>
</html>
