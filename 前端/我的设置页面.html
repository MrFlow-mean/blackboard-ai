        function t(key, lang) {
            const dict = i18nText[lang] || i18nText['zh-CN'];
            return dict[key] || i18nText['zh-CN'][key] || '';
        }

        function applyTranslations(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                let value = t(key, lang);
                if (key === 'item_daily_goal_desc' && rangeInput) {
                    value = value.replace('{{minutes}}', rangeInput.value);
                }
                el.textContent = value;
            });
            document.title = `Linguify - ${t('title_settings', lang)}`;
        }

        function updateLearningGoalText(lang, minutes) {
            const textNode = rangeInput?.previousElementSibling?.querySelector('p.text-xs');
            if (!textNode) return;
            const template = t('item_daily_goal_desc', lang);
            textNode.textContent = template.replace('{{minutes}}', minutes);
        }

        rangeInput?.addEventListener('input', (e) => {
            const lang = getSavedLanguage();
            updateLearningGoalText(lang, e.target.value);
        });

        // UI language modal
        const languageModal = document.getElementById('language-modal');
        const languageModalClose = document.getElementById('language-modal-close');
        const accountLanguageBtn = document.getElementById('account-ui-language');
        const displayLanguageBtn = document.getElementById('set-ui-language');
        const languageValue = document.getElementById('ui-language-value');
        const languageValue2 = document.getElementById('ui-language-value-2');
        const languageOptions = document.querySelectorAll('.language-option');
        const LANG_STORAGE_KEY = 'ui-language';
        const languageLabels = {
            'zh-CN': '简体中文',
            'en': 'English'
        };
        const languageToast = document.getElementById('language-toast');
        let languageToastTimer = null;

        function getSavedLanguage() {
            return localStorage.getItem(LANG_STORAGE_KEY) || 'zh-CN';
        }

        function updateLanguageUI(lang) {
            const label = languageLabels[lang] || languageLabels['zh-CN'];
            if (languageValue) languageValue.textContent = label;
            if (languageValue2) languageValue2.textContent = label;
            document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
            languageOptions.forEach(btn => {
                const active = btn.dataset.lang === lang;
                btn.classList.toggle('ring-2', active);
                btn.classList.toggle('ring-sky-400', active);
                const check = btn.querySelector('.lang-check');
                if (check) {
                    check.classList.toggle('hidden', !active);
                }
            });
            applyTranslations(lang);
            if (rangeInput) {
                updateLearningGoalText(lang, rangeInput.value);
            }
        }

        function openLanguageModal() {
            if (!languageModal) return;
            languageModal.classList.remove('hidden');
            languageModal.classList.add('flex');
        }

        function closeLanguageModal() {
            if (!languageModal) return;
            languageModal.classList.add('hidden');
            languageModal.classList.remove('flex');
        }

        function showLanguageToast(lang) {
            if (!languageToast) return;
            const label = languageLabels[lang] || languageLabels['zh-CN'];
            const template = t('toast_language_changed', lang);
            languageToast.textContent = template.replace('{{label}}', label);
            languageToast.classList.remove('hidden');
            if (languageToastTimer) clearTimeout(languageToastTimer);
            languageToastTimer = setTimeout(() => {
                languageToast.classList.add('hidden');
            }, 1600);
        }

        accountLanguageBtn?.addEventListener('click', openLanguageModal);
        displayLanguageBtn?.addEventListener('click', openLanguageModal);
        languageModalClose?.addEventListener('click', closeLanguageModal);
        languageModal?.addEventListener('click', (e) => {
            if (e.target === languageModal) closeLanguageModal();
        });

        languageOptions.forEach(btn => {
            btn.addEventListener('click', () => {
                const lang = btn.dataset.lang || 'zh-CN';
                localStorage.setItem(LANG_STORAGE_KEY, lang);
                updateLanguageUI(lang);
                showLanguageToast(lang);
                closeLanguageModal();
            });
        });

        // Init language display
        const initLang = getSavedLanguage();
        updateLanguageUI(initLang);
        applyTranslations(initLang);
        if (rangeInput) {
            updateLearningGoalText(initLang, rangeInput.value);
        }
    </script>
